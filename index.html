function updateCamera(){
  if(drivingTank){
    const tk=drivingTank, yaw=camYaw.v, pitch=Math.max(-0.4,Math.min(0.6,camPitch.v));
    const dir=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
    const want=tk.pos.clone().add(dir.clone().multiplyScalar(-9)).add(new THREE.Vector3(0,5,0));
    camera.position.lerp(want,0.4);
    const aim=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch));
    camera.lookAt(tk.pos.clone().setY(tk.pos.y+1.5).add(aim.multiplyScalar(30)));
  } else if(piloting){
    const P=piloting, yaw=camYaw.v, pitch=Math.max(-1.1,Math.min(1.1,camPitch.v));
    const dir=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch));
    const want=P.pos.clone().add(dir.clone().multiplyScalar(-13)).add(new THREE.Vector3(0,4,0));
    camera.position.lerp(want, 0.35);
    camera.lookAt(P.pos.clone().add(dir.multiplyScalar(30)));
  } else if(manning){
    const pl=manning; const wp=pl.group.getWorldPosition(new THREE.Vector3());
    const yaw=camYaw.v, pitch=camPitch.v;
    const back=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).multiplyScalar(-4.5);
    camera.position.copy(wp).add(back).add(new THREE.Vector3(0,2.6,0));
    const aim=new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),Math.cos(yaw)*Math.cos(pitch));
    camera.lookAt(wp.clone().add(aim.multiplyScalar(40)).add(new THREE.Vector3(0,1.5,0)));
  } else if(driving){
    const eye=player.build.group.localToWorld(player.helmEye.clone());
    camera.position.copy(eye);
    const dir=new THREE.Vector3(Math.sin(camYaw.v)*Math.cos(camPitch.v),Math.sin(camPitch.v),Math.cos(camYaw.v)*Math.cos(camPitch.v));
    camera.lookAt(eye.clone().add(dir));
  } else if(onFoot){
    camera.position.copy(footPos);                               // ashore — world-space foot position
    const dir=new THREE.Vector3(Math.sin(camYaw.v)*Math.cos(camPitch.v),Math.sin(camPitch.v),Math.cos(camYaw.v)*Math.cos(camPitch.v));
    camera.lookAt(footPos.clone().add(dir));
  } else {
    const eye=player.build.group.localToWorld(walkPos.clone());   // sailor local -> world (ship may be moving)
    camera.position.copy(eye);
    const dir=new THREE.Vector3(Math.sin(camYaw.v)*Math.cos(camPitch.v),Math.sin(camPitch.v),Math.cos(camYaw.v)*Math.cos(camPitch.v));
    camera.lookAt(eye.clone().add(dir));
  }
}
let promptT=0, promptMsg='';
function flashPrompt(msg){ promptMsg=msg; promptT=2; }
function updatePrompt(){
  const el=document.getElementById('prompt'); let msg='';
  if(promptT>0){ promptT-=0.016; msg=promptMsg; }
  else if(drivingTank){ msg='Tank — W/S drive · A/D turn · Mouse aim · Click fire   ·   E to dismount'; }
  else if(onFoot){ const near=Math.hypot(footPos.x-player.pos.x,footPos.z-player.pos.z)<player.build.halfLen+18; const tk=nearestPlayerTank();
    msg='Ashore — WASD walk · Click to fire' + (tk?'   ·   E to board the tank':'') + (near?'   ·   G to re-board ship':''); }
  else if(driving){ msg='Steering the ship — W/S throttle · A/D rudder   ·   E to step away from the helm'; }
  else if(piloting){
    if(piloting.phase==='takeoff') msg='Taking off…';
    else if(piloting.phase==='landing') msg='Landing — line up OVER the ship and descend · E to abort';
    else { const heli=piloting.plane.def.heli; const b=piloting.plane.def.bomb?`   ·   Space drop (${piloting.plane.bombsLeft})`:'';
      msg=(heli?'W/S fwd · A/D turn · Mouse = climb/descend':'W/S throttle · A/D turn · Mouse = pitch')+' · Click guns'+b+'   ·   E to land'; }
  }
  else if(!manning && !shopOpen){
    const tu=nearestTurret(), pa=nearestPlane(), hm=nearestHelm();
    let alongside=false; landSpots().forEach(o=>{ if(Math.hypot(player.pos.x-o.pos.x,player.pos.z-o.pos.z)-o.r<80) alongside=true; });
    if(hm) msg='Press E to take the helm (steer the ship)';
    else if(alongside) msg='Press G to go ashore';
    else if(tu) msg='Press E to man '+tu.def.name;
    else if(pa) msg='Press E to fly the '+pa.def.name;
    else if(placed.length>=player.def.mounts) msg='Gun limit reached ('+placed.length+'/'+player.def.mounts+') — a bigger ship mounts more';
    else msg= selectedWeapon? 'Press F to install '+WEAPONS[selectedWeapon].name+' ($'+WEAPONS[selectedWeapon].cost+')  ['+placed.length+'/'+player.def.mounts+' guns]' : 'Pick a weapon in the Armory (Tab), then F to install anywhere on deck';
  } else if(manning){ msg='Fire: Left Click   ·   E to leave turret'; }
  el.style.display=msg?'block':'none'; el.textContent=msg;
}
function updateHUD(){
  document.getElementById('money').textContent='$'+money;
  document.getElementById('score').textContent='Sunk: '+sunk+'   ·   Guns '+placed.length+'/'+player.def.mounts;
  document.querySelector('#shiphp>i').style.width=(player.hp/player.maxhp*100)+'%';
  if(enemyHarbor){ document.getElementById('ehp').textContent=Math.ceil(enemyHarbor.hp/enemyHarbor.maxhp*100)+'%'; }
  if(friendlyHarbor){ document.getElementById('fhp').textContent=Math.ceil(friendlyHarbor.hp/friendlyHarbor.maxhp*100)+'%'; }
}
function updateMode(){
  const el=document.getElementById('mode');
  el.innerHTML = drivingTank ? '<b>TANK</b><br>W/S drive · A/D turn<br>Mouse aim · Click fire · E dismount'
    : onFoot ? '<b>ASHORE</b><br>WASD walk · Click = rifle<br>E board tank · G re-board ship'
    : driving ? '<b>AT THE HELM</b><br>W/S throttle · A/D rudder<br>Mouse look · E to step away'
    : piloting ? (piloting.phase==='takeoff' ? '<b>TAKEOFF</b><br>Climbing out…'
        : piloting.phase==='landing' ? '<b>LANDING</b><br>Descend over the ship<br>E to abort'
        : '<b>IN FLIGHT</b><br>Mouse + A/D steer · W/S throttle<br>Click guns · Space bombs · E to land')
    : manning ? '<b>GUNNERY</b><br>Mouse aim · Click fire · E exit'
    : shopOpen ? '<b>ARMORY OPEN</b><br>Click weapon/plane · Tab to close'
    : '<b>ON DECK</b><br>WASD walk · Mouse look<br>F install · E man/fly · G ashore · Tab shop';
}

// =====================================================================
//  END
// =====================================================================
function endGame(win,msg){
  if(phase==='over')return; phase='over';
  if(document.pointerLockElement)document.exitPointerLock();
  document.getElementById('over').style.display='flex';
  const t=document.getElementById('overTitle');
  t.textContent = win?'VICTORY':'DEFEAT'; t.style.color = win?'#7ff0a8':'#ff7a6a';
  document.getElementById('overText').textContent = (msg?msg+'  ':'') + `You sank ${sunk} ${sunk===1?'ship':'ships'}. ($${money} in the bank.)`;
}

// =====================================================================
//  LOOP
// =====================================================================
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05, clock.getDelta()); t2+=dt;
  if(phase==='play'){ update(dt,t2); updateHUD(); }
  renderer.render(scene,camera);
}

// boot — show the menu immediately (pure DOM), then start 3D once Three.js is ready.
// (some hosts, e.g. htmlpreview.github.io, run this script before the CDN <script> finishes.)
buildMenu();
function start3D(){ try{ initThree(); initWaterBase(); loop(); }catch(e){ console.error(e);
  const sub=document.querySelector('#menu .sub'); if(sub) sub.textContent='Could not start the 3D engine — try GitHub Pages or open the file directly.'; } }
if(window.THREE){ start3D(); }
else { let n=0; (function wait(){ if(window.THREE){ start3D(); } else if(n++<200){ setTimeout(wait,50); }
  else { const sub=document.querySelector('#menu .sub'); if(sub) sub.textContent='Three.js failed to load (check connection / use GitHub Pages).'; } })(); }
</script>
