<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Battle Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0d1117; --panel:#161b22; --line:#283040; --red:#ff5050; --blue:#4da6ff; --txt:#e6edf3; --dim:#8b949e; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:"Segoe UI",system-ui,sans-serif;
         display:flex; overflow:hidden; }

  /* ---- side panel ---- */
  #panel { width:300px; min-width:300px; height:100vh; background:var(--panel);
           border-right:1px solid var(--line); display:flex; flex-direction:column; }
  #panel h1 { font-size:16px; padding:12px 14px; border-bottom:1px solid var(--line);
              letter-spacing:.5px; display:flex; gap:8px; align-items:center; }
  #panel h1 small { color:var(--dim); font-weight:400; font-size:11px; }
  .scroll { overflow-y:auto; padding:10px 12px; flex:1; }
  .scroll::-webkit-scrollbar { width:8px; }
  .scroll::-webkit-scrollbar-thumb { background:#2c333f; border-radius:4px; }
  .sec { margin-bottom:14px; }
  .sec > .lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:6px; }

  .teamrow { display:flex; gap:8px; }
  .teamrow button { flex:1; padding:9px; border:2px solid var(--line); background:#1c2330; color:var(--txt);
                    border-radius:8px; cursor:pointer; font-weight:600; }
  .teamrow button.sel.red { border-color:var(--red); background:rgba(255,80,80,.16); color:#ffb3b3; }
  .teamrow button.sel.blue { border-color:var(--blue); background:rgba(77,166,255,.16); color:#bfe0ff; }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .chip { display:flex; align-items:center; gap:7px; padding:7px 8px; border:1px solid var(--line);
          background:#1c2330; border-radius:7px; cursor:pointer; font-size:12px; user-select:none; }
  .chip:hover { border-color:#3d4860; }
  .chip.sel { border-color:#ffd166; background:rgba(255,209,102,.12); box-shadow:0 0 0 1px #ffd16655 inset; }
  .chip .em { font-size:16px; line-height:1; }
  .chip .nm { font-weight:600; }
  .chip .st { color:var(--dim); font-size:10px; display:block; }

  .wgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .wchip { position:relative; }
  .wchip.melee { } .wchip.ranged { }
  .wchip .tag { position:absolute; top:3px; right:4px; font-size:8px; color:var(--dim); text-transform:uppercase; }

  select, input[type=range] { width:100%; }
  select { padding:8px; background:#1c2330; color:var(--txt); border:1px solid var(--line); border-radius:7px; }

  /* ---- bottom controls ---- */
  #controls { border-top:1px solid var(--line); padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  #controls .row { display:flex; gap:8px; }
  #controls button { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px; }
  #startBtn { background:#2ea043; color:#fff; }
  #startBtn.battle { background:#d29922; }
  #resetBtn { background:#30363d; color:var(--txt); }
  #clearBtn { background:#30363d; color:var(--txt); }
  #randBtn  { background:#1f6feb; color:#fff; }
  .speedrow { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--dim); }

  /* ---- stage ---- */
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#06080d; }
  canvas { background:#0f141c; image-rendering:auto; max-width:100%; max-height:100%; box-shadow:0 0 40px #000a; }
  #hint { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--dim);
          background:#0009; padding:5px 12px; border-radius:20px; pointer-events:none; }
  #banner { position:absolute; top:0;left:0;right:0;bottom:0; display:none; align-items:center; justify-content:center;
            flex-direction:column; gap:10px; background:#0008; pointer-events:none; }
  #banner h2 { font-size:54px; text-shadow:0 4px 20px #000; }
  #banner p { color:var(--dim); }
  #counts { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:18px;
            font-weight:700; font-size:15px; background:#000a; padding:6px 18px; border-radius:20px; }
</style>
</head>
<body>
  <div id="panel">
    <h1>⚔️ Battle Sim <small>2D</small></h1>
    <div class="scroll">
      <div class="sec">
        <div class="lbl">Team brush</div>
        <div class="teamrow">
          <button id="teamRed"  class="sel red">🔴 Red</button>
          <button id="teamBlue" class="blue">🔵 Blue</button>
        </div>
      </div>
      <div class="sec">
        <div class="lbl">Skin</div>
        <div class="grid" id="skinGrid"></div>
      </div>
      <div class="sec">
        <div class="lbl">Weapon &nbsp;<span style="color:#ffd166">(dbl-click = arm everyone)</span></div>
        <div class="wgrid" id="weaponGrid"></div>
      </div>
      <div class="sec">
        <div class="lbl">Map</div>
        <select id="mapSel"></select>
      </div>
    </div>
    <div id="controls">
      <div class="speedrow">Speed <input type="range" id="speed" min="0.25" max="3" step="0.25" value="1"><span id="speedVal">1×</span></div>
      <div class="row">
        <button id="randBtn">🎲 Random Army</button>
        <button id="clearBtn">🗑 Clear</button>
      </div>
      <div class="row">
        <button id="resetBtn">↺ Reset</button>
        <button id="startBtn">▶ Start</button>
      </div>
    </div>
  </div>

  <div id="stage">
    <canvas id="cv" width="1280" height="720"></canvas>
    <div id="hint">Click to place a fighter • drag to place many • right-click to delete</div>
    <div id="counts"><span style="color:var(--red)" id="cRed">0</span><span style="color:var(--dim)">vs</span><span style="color:var(--blue)" id="cBlue">0</span></div>
    <div id="banner"><h2 id="bTitle"></h2><p>Press Reset to set up again</p></div>
  </div>

<script>
/* ============================================================ DATA */
const SKINS = [
  { id:'soldier', name:'Soldier', em:'🪖', hp:100, speed:1.0, size:14, color:'#6b8f3a' },
  { id:'scout',   name:'Scout',   em:'🏃', hp:60,  speed:1.9, size:11, color:'#d4b13a' },
  { id:'ninja',   name:'Ninja',   em:'🥷', hp:80,  speed:1.55,size:12, color:'#2b2f38' },
  { id:'knight',  name:'Knight',  em:'🛡️', hp:170, speed:0.82,size:15, color:'#5b7fa6' },
  { id:'tank',    name:'Tank',    em:'🦾', hp:260, speed:0.6, size:20, color:'#7d8590' },
  { id:'zombie',  name:'Zombie',  em:'🧟', hp:130, speed:0.7, size:14, color:'#5a7d4a' },
  { id:'robot',   name:'Robot',   em:'🤖', hp:150, speed:1.0, size:15, color:'#9aa7b8' },
  { id:'giant',   name:'Giant',   em:'🗿', hp:480, speed:0.5, size:30, color:'#8a6d4a' },
];

// cat: melee | ranged. ranged uses speed(px/s), spread(rad), pellets, aoe(px,0=none), pierce
const WEAPONS = [
  { id:'fists',  name:'Fists',  em:'👊', cat:'melee',  dmg:8,  range:26, cd:380,  knock:60,  color:'#ddd' },
  { id:'knife',  name:'Knife',  em:'🔪', cat:'melee',  dmg:15, range:30, cd:330,  knock:50,  color:'#cdd' },
  { id:'sword',  name:'Sword',  em:'⚔️', cat:'melee',  dmg:26, range:44, cd:560,  knock:120, color:'#cfe' },
  { id:'spear',  name:'Spear',  em:'🔱', cat:'melee',  dmg:22, range:62, cd:680,  knock:140, color:'#dca' },
  { id:'hammer', name:'Hammer', em:'🔨', cat:'melee',  dmg:48, range:42, cd:1050, knock:280, color:'#fb6' },
  { id:'katana', name:'Katana', em:'🗡️', cat:'melee',  dmg:30, range:48, cd:480,  knock:100, color:'#aef' },
  { id:'pistol', name:'Pistol', em:'🔫', cat:'ranged', dmg:18, range:280, cd:430, speed:520, spread:0.04, pellets:1, aoe:0, color:'#ffe27a' },
  { id:'rifle',  name:'Rifle',  em:'🎯', cat:'ranged', dmg:13, range:360, cd:120, speed:640, spread:0.05, pellets:1, aoe:0, color:'#ffd166' },
  { id:'shotgun',name:'Shotgun',em:'💥', cat:'ranged', dmg:8,  range:170, cd:780, speed:480, spread:0.22, pellets:7, aoe:0, color:'#ffb86b' },
  { id:'sniper', name:'Sniper', em:'🔭', cat:'ranged', dmg:95, range:640, cd:1500,speed:1100,spread:0.004,pellets:1, aoe:0, pierce:true, color:'#7af7ff' },
  { id:'minigun',name:'Minigun',em:'🌀', cat:'ranged', dmg:7,  range:320, cd:55,  speed:660, spread:0.10, pellets:1, aoe:0, color:'#ff9e57' },
  { id:'rocket', name:'Rocket', em:'🚀', cat:'ranged', dmg:65, range:400, cd:1300,speed:360, spread:0.02, pellets:1, aoe:70, color:'#ff6b4a' },
  { id:'flame',  name:'Flame',  em:'🔥', cat:'ranged', dmg:4,  range:110, cd:45,  speed:320, spread:0.18, pellets:2, aoe:0, life:0.28, color:'#ff7b2e' },
  { id:'freeze', name:'Freeze', em:'❄️', cat:'ranged', dmg:6,  range:220, cd:110, speed:440, spread:0.06, pellets:1, aoe:0, slow:0.45, color:'#9fe3ff' },
  { id:'railgun',name:'Railgun',em:'⚡', cat:'ranged', dmg:115,range:720, cd:1800,speed:1600,spread:0,    pellets:1, aoe:0, pierce:true, color:'#b18bff' },
  { id:'bow',    name:'Bow',    em:'🏹', cat:'ranged', dmg:36, range:340, cd:720, speed:560, spread:0.02, pellets:1, aoe:0, color:'#caa15a' },
];

const W = 1280, H = 720, WALL_C = '#2a3346', WALL_E = '#3b4760';
function rect(x,y,w,h){ return {x,y,w,h}; }
const MAPS = [
  { name:'Open Arena', build:()=>[] },
  { name:'Pillars', build:()=>{ const a=[]; for(let i=0;i<5;i++)for(let j=0;j<3;j++) a.push(rect(280+i*180,150+j*200,46,46)); return a; } },
  { name:'Central Wall', build:()=>[ rect(620,0,40,250), rect(620,470,40,250), rect(620,300,40,120) ] },
  { name:'Fortress', build:()=>[ rect(490,200,40,320), rect(750,200,40,320), rect(490,200,140,40), rect(650,200,140,40), rect(490,480,300,40) ] },
  { name:'Maze', build:()=>[ rect(300,80,40,360), rect(540,260,40,380), rect(780,80,40,360), rect(980,260,40,380), rect(120,500,260,40), rect(820,160,260,40) ] },
  { name:'Crossfire', build:()=>[ rect(220,160,90,90), rect(970,160,90,90), rect(220,470,90,90), rect(970,470,90,90), rect(590,300,110,110) ] },
];

/* ============================================================ STATE */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let walls = MAPS[0].build();
let units = [], projs = [], fx = [];
let brush = { team:'red', skin:SKINS[0].id, weapon:WEAPONS[6].id };
let mode = 'setup';          // setup | battle | over
let paused = false, speed = 1;
let mapIndex = 0;

/* ============================================================ UI BUILD */
function skinById(id){ return SKINS.find(s=>s.id===id); }
function wepById(id){ return WEAPONS.find(w=>w.id===id); }

const skinGrid = document.getElementById('skinGrid');
SKINS.forEach(s=>{
  const el = document.createElement('div');
  el.className = 'chip' + (s.id===brush.skin?' sel':'');
  el.innerHTML = `<span class="em">${s.em}</span><span class="nm">${s.name}<span class="st">HP ${s.hp} · SPD ${s.speed}</span></span>`;
  el.onclick = ()=>{ brush.skin=s.id; refreshSel(skinGrid,s.id,SKINS); };
  skinGrid.appendChild(el);
});
const weaponGrid = document.getElementById('weaponGrid');
WEAPONS.forEach(w=>{
  const el = document.createElement('div');
  el.className = 'chip wchip '+w.cat + (w.id===brush.weapon?' sel':'');
  el.innerHTML = `<span class="em">${w.em}</span><span class="nm">${w.name}<span class="st">DMG ${w.dmg}${w.pellets>1?'×'+w.pellets:''} · ${w.cat==='melee'?'MEL':'RNG '+w.range}</span></span><span class="tag">${w.cat[0]}</span>`;
  el.onclick = ()=>{ brush.weapon=w.id; refreshSel(weaponGrid,w.id,WEAPONS); };
  el.ondblclick = ()=>{ armEveryone(w.id); };
  weaponGrid.appendChild(el);
});
function refreshSel(grid,id,arr){ [...grid.children].forEach((c,i)=> c.classList.toggle('sel', arr[i].id===id)); }

const mapSel = document.getElementById('mapSel');
MAPS.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=m.name; mapSel.appendChild(o); });
mapSel.onchange = ()=>{ mapIndex=+mapSel.value; walls=MAPS[mapIndex].build(); };

document.getElementById('teamRed').onclick  = ()=>setTeam('red');
document.getElementById('teamBlue').onclick = ()=>setTeam('blue');
function setTeam(t){ brush.team=t;
  document.getElementById('teamRed').classList.toggle('sel', t==='red');
  document.getElementById('teamBlue').classList.toggle('sel', t==='blue');
}

const speedEl = document.getElementById('speed'), speedVal=document.getElementById('speedVal');
speedEl.oninput = ()=>{ speed=+speedEl.value; speedVal.textContent=speed+'×'; };

const startBtn=document.getElementById('startBtn');
startBtn.onclick = toggleBattle;
document.getElementById('resetBtn').onclick = resetBattle;
document.getElementById('clearBtn').onclick = ()=>{ units=[]; projs=[]; fx=[]; setMode('setup'); };
document.getElementById('randBtn').onclick = randomArmy;

addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); toggleBattle(); }
  else if(e.key==='r'||e.key==='R') resetBattle();
  else if(e.key==='c'||e.key==='C'){ units=[]; projs=[]; fx=[]; setMode('setup'); }
});

/* ============================================================ PLACEMENT */
function toWorld(e){
  const r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
function inWall(x,y,pad=0){ return walls.some(w=> x>w.x-pad&&x<w.x+w.w+pad&&y>w.y-pad&&y<w.y+w.h+pad); }
function unitAt(x,y){ return units.find(u=>{ const dx=u.x-x,dy=u.y-y; return dx*dx+dy*dy < (u.size+4)*(u.size+4); }); }

function makeUnit(x,y,team,skinId,weaponId){
  const s=skinById(skinId);
  return { team, skin:skinId, weapon:weaponId, x, y, sx:x, sy:y,
           hp:s.hp, maxHp:s.hp, size:s.size, speed:s.speed,
           face:team==='red'?0:Math.PI, cd:0, target:null, retarget:0,
           alive:true, slow:0, swing:0, hit:0, deadT:0 };
}
function spawnUnit(x,y){
  if(inWall(x,y,8)) return;
  const s=skinById(brush.skin);
  if(x<s.size||x>W-s.size||y<s.size||y>H-s.size) return;
  units.push(makeUnit(x,y,brush.team,brush.skin,brush.weapon));
}

let dragging=false, lastPlace=null;
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('mousedown', e=>{
  if(mode!=='setup') return;
  const p=toWorld(e);
  if(e.button===2){ const u=unitAt(p.x,p.y); if(u) units.splice(units.indexOf(u),1); return; }
  const u=unitAt(p.x,p.y);
  if(u){ u.weapon=brush.weapon; u.team=brush.team; const s=skinById(brush.skin); /* keep skin? only weapon+team on click */ flash(u.x,u.y,'#ffd166'); return; }
  dragging=true; lastPlace=p; spawnUnit(p.x,p.y);
});
addEventListener('mousemove', e=>{
  if(!dragging||mode!=='setup') return;
  const p=toWorld(e);
  if(!lastPlace || (p.x-lastPlace.x)**2+(p.y-lastPlace.y)**2 > 28*28){ lastPlace=p; spawnUnit(p.x,p.y); }
});
addEventListener('mouseup', ()=> dragging=false);

function armEveryone(wid){ units.forEach(u=> u.weapon=wid); toast('Armed '+units.length+' fighters with '+wepById(wid).name); }
let toastT=0, toastMsg='';
function toast(m){ toastMsg=m; toastT=1.6; }

function randomArmy(){
  units=[]; projs=[]; fx=[]; setMode('setup');
  const n=8;
  for(const team of ['red','blue']){
    const x0 = team==='red'? 120 : W-120-260;
    for(let i=0;i<n;i++){
      const s=SKINS[(Math.random()*SKINS.length)|0];
      const w=WEAPONS[(Math.random()*WEAPONS.length)|0];
      let x,y,tries=0;
      do{ x=x0+Math.random()*260; y=90+Math.random()*(H-180); tries++; }while(inWall(x,y,10)&&tries<30);
      units.push(makeUnit(x,y,team,s.id,w.id));
    }
  }
}

/* ============================================================ BATTLE FLOW */
function setMode(m){
  mode=m;
  startBtn.textContent = m==='battle' ? '⏸ Pause' : '▶ Start';
  startBtn.classList.toggle('battle', m==='battle');
  document.getElementById('banner').style.display = m==='over' ? 'flex' : 'none';
  document.getElementById('hint').style.display = m==='setup' ? 'block' : 'none';
}
function toggleBattle(){
  if(mode==='setup'){ if(units.length===0) return; startBattle(); }
  else if(mode==='battle'){ paused=!paused; startBtn.textContent = paused?'▶ Resume':'⏸ Pause'; }
  else if(mode==='over'){ resetBattle(); }
}
function startBattle(){ paused=false; projs=[]; fx=[]; units.forEach(u=>{u.sx=u.x;u.sy=u.y;}); setMode('battle'); }
function resetBattle(){
  projs=[]; fx=[];
  units.forEach(u=>{ const s=skinById(u.skin); u.x=u.sx; u.y=u.sy; u.hp=s.hp; u.maxHp=s.hp; u.alive=true; u.cd=0; u.target=null; u.slow=0; u.swing=0; u.hit=0; u.deadT=0; });
  setMode('setup');
}

/* ============================================================ COMBAT / AI */
const FRICTION=0.86, BASE_SPD=78;
function dist2(a,b){ const dx=a.x-b.x,dy=a.y-b.y; return dx*dx+dy*dy; }

function nearestEnemy(u){
  let best=null,bd=Infinity;
  for(const e of units){ if(!e.alive||e.team===u.team) continue; const d=dist2(u,e); if(d<bd){bd=d;best=e;} }
  return best;
}

function tryMove(u, vx, vy){
  // axis-separated so units slide along walls
  let nx=u.x+vx;
  if(nx<u.size) nx=u.size; if(nx>W-u.size) nx=W-u.size;
  if(!inWall(nx,u.y,u.size*0.7)) u.x=nx;
  let ny=u.y+vy;
  if(ny<u.size) ny=u.size; if(ny>H-u.size) ny=H-u.size;
  if(!inWall(u.x,ny,u.size*0.7)) u.y=ny;
}

function shoot(u, w, tx, ty){
  const baseAng=Math.atan2(ty-u.y, tx-u.x);
  const pel = w.pellets||1;
  for(let i=0;i<pel;i++){
    const ang=baseAng + (Math.random()-0.5)*(w.spread||0);
    projs.push({ x:u.x+Math.cos(baseAng)*(u.size+4), y:u.y+Math.sin(baseAng)*(u.size+4),
      vx:Math.cos(ang)*w.speed, vy:Math.sin(ang)*w.speed, dmg:w.dmg, team:u.team,
      color:w.color, aoe:w.aoe||0, pierce:!!w.pierce, slow:w.slow||0,
      life:w.life||(w.range/w.speed)+0.05, r:w.aoe?5:(w.pierce?2.5:3) });
  }
  flash(u.x+Math.cos(baseAng)*(u.size+6), u.y+Math.sin(baseAng)*(u.size+6), w.color);
}

function meleeHit(u, w, tgt){
  damage(tgt, w.dmg, u);
  const ang=Math.atan2(tgt.y-u.y, tgt.x-u.x);
  tgt.x += Math.cos(ang)*(w.knock||60)*0.18; tgt.y += Math.sin(ang)*(w.knock||60)*0.18;
  u.swing=1;
  fx.push({type:'slash', x:u.x, y:u.y, ang, len:w.range, color:w.color, t:0.18, max:0.18});
}

function damage(tgt, dmg, src){
  if(!tgt.alive) return;
  tgt.hp -= dmg; tgt.hit=1;
  if(tgt.hp<=0){ tgt.alive=false; tgt.deadT=0; flash(tgt.x,tgt.y,'#fff',true); }
  else flash(tgt.x,tgt.y, src&&src.team==='red'?'#ff8080':'#9fc8ff');
}

function explode(x,y,team,dmg,radius){
  fx.push({type:'boom', x, y, r:radius, t:0.3, max:0.3});
  for(const e of units){ if(!e.alive||e.team===team) continue;
    const d=Math.hypot(e.x-x,e.y-y); if(d<radius){ damage(e, dmg*(1-d/radius)+dmg*0.3);
      const a=Math.atan2(e.y-y,e.x-x); e.x+=Math.cos(a)*22; e.y+=Math.sin(a)*22; } }
}

function flash(x,y,color,big){ fx.push({type:'spark', x, y, color, t:0.18, max:0.18, big:!!big}); }

function updateBattle(dt){
  for(const u of units){
    if(!u.alive){ u.deadT+=dt; continue; }
    u.cd-=dt*1000; if(u.swing>0)u.swing-=dt*6; if(u.hit>0)u.hit-=dt*5;
    if(u.slow>0) u.slow-=dt;
    u.retarget-=dt;
    if(!u.target||!u.target.alive||u.retarget<=0){ u.target=nearestEnemy(u); u.retarget=0.4+Math.random()*0.3; }
    const t=u.target; if(!t) continue;
    const w=wepById(u.weapon);
    const d=Math.hypot(t.x-u.x,t.y-u.y);
    u.face=Math.atan2(t.y-u.y,t.x-u.x);
    const engage = w.cat==='melee'? w.range : w.range;
    const prefer = w.cat==='melee'? w.range*0.7 : w.range*0.72;

    // separation from allies
    let sepx=0,sepy=0;
    for(const a of units){ if(a===u||!a.alive) continue; const dd=Math.hypot(a.x-u.x,a.y-u.y); const min=(a.size+u.size)*0.9;
      if(dd<min&&dd>0.1){ sepx+=(u.x-a.x)/dd*(min-dd); sepy+=(u.y-a.y)/dd*(min-dd); } }

    let mvx=0,mvy=0;
    if(d>prefer){ mvx=Math.cos(u.face); mvy=Math.sin(u.face); }
    else if(w.cat==='ranged' && d<w.range*0.4){ mvx=-Math.cos(u.face)*0.7; mvy=-Math.sin(u.face)*0.7; } // kite
    const slowF = u.slow>0?0.45:1;
    const sp = u.speed*BASE_SPD*slowF*dt;
    tryMove(u, (mvx)*sp + sepx*0.5, (mvy)*sp + sepy*0.5);

    // attack
    if(d<=engage && u.cd<=0){
      u.cd = w.cd;
      if(w.cat==='melee') meleeHit(u,w,t);
      else shoot(u,w,t.x,t.y);
    }
  }

  // projectiles
  for(const p of projs){
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.life<=0){ if(p.aoe) explode(p.x,p.y,p.team,p.dmg,p.aoe); p.dead=true; continue; }
    if(p.x<0||p.x>W||p.y<0||p.y>H||inWall(p.x,p.y)){ if(p.aoe) explode(p.x,p.y,p.team,p.dmg,p.aoe); p.dead=true; continue; }
    for(const e of units){ if(!e.alive||e.team===p.team) continue;
      if((e.x-p.x)**2+(e.y-p.y)**2 < (e.size+p.r)**2){
        if(p.aoe){ explode(p.x,p.y,p.team,p.dmg,p.aoe); }
        else { damage(e,p.dmg); if(p.slow) e.slow=Math.max(e.slow,1.2); }
        if(!p.pierce){ p.dead=true; break; }
      }
    }
  }
  projs=projs.filter(p=>!p.dead);

  for(const f of fx){ f.t-=dt; } fx=fx.filter(f=>f.t>0);

  // win check
  const r=units.filter(u=>u.alive&&u.team==='red').length;
  const b=units.filter(u=>u.alive&&u.team==='blue').length;
  if((r===0||b===0) && units.length){
    setMode('over');
    const bt=document.getElementById('bTitle');
    if(r===0&&b===0){ bt.textContent='Mutual Destruction'; bt.style.color='#fff'; }
    else if(b===0){ bt.textContent='🔴 Red Wins!'; bt.style.color='var(--red)'; }
    else { bt.textContent='🔵 Blue Wins!'; bt.style.color='var(--blue)'; }
  }
}

/* ============================================================ RENDER */
function render(){
  ctx.clearRect(0,0,W,H);
  // floor grid
  ctx.fillStyle='#0f141c'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#141b26'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // setup zones
  if(mode==='setup'){
    ctx.fillStyle='rgba(255,80,80,.05)'; ctx.fillRect(0,0,W/2,H);
    ctx.fillStyle='rgba(77,166,255,.05)'; ctx.fillRect(W/2,0,W/2,H);
  }
  // walls
  for(const w of walls){ ctx.fillStyle=WALL_C; ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle=WALL_E; ctx.lineWidth=2; ctx.strokeRect(w.x+1,w.y+1,w.w-2,w.h-2); }

  // dead first
  for(const u of units){ if(u.alive) continue; const a=Math.max(0,1-u.deadT/4);
    ctx.globalAlpha=a*0.5; ctx.strokeStyle='#555'; ctx.lineWidth=3; const r=u.size*0.6;
    ctx.beginPath(); ctx.moveTo(u.x-r,u.y-r); ctx.lineTo(u.x+r,u.y+r); ctx.moveTo(u.x+r,u.y-r); ctx.lineTo(u.x-r,u.y+r); ctx.stroke();
    ctx.globalAlpha=1; }

  // fx under units
  for(const f of fx){ const k=f.t/f.max;
    if(f.type==='boom'){ ctx.globalAlpha=k*0.7; ctx.fillStyle='#ff7b3a'; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1-k*0.4),0,7); ctx.fill();
      ctx.globalAlpha=k; ctx.strokeStyle='#ffd166'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1-k*0.2),0,7); ctx.stroke(); ctx.globalAlpha=1; }
  }

  // units
  for(const u of units){ if(!u.alive) continue;
    const s=skinById(u.skin), w=wepById(u.weapon);
    // weapon stub
    ctx.save(); ctx.translate(u.x,u.y); ctx.rotate(u.face);
    const sw = u.swing>0? u.swing*0.5:0;
    ctx.rotate(-sw);
    ctx.strokeStyle=w.color; ctx.lineWidth= w.cat==='melee'?4:3; ctx.lineCap='round';
    const wl = w.cat==='melee'? w.range*0.55 : u.size+9;
    ctx.beginPath(); ctx.moveTo(u.size*0.4,0); ctx.lineTo(u.size*0.4+wl,0); ctx.stroke();
    ctx.restore();
    // body
    ctx.beginPath(); ctx.arc(u.x,u.y,u.size,0,7);
    ctx.fillStyle = u.hit>0? '#fff' : s.color; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle = u.team==='red'?'#ff5050':'#4da6ff'; ctx.stroke();
    if(u.slow>0){ ctx.strokeStyle='#9fe3ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(u.x,u.y,u.size+3,0,7); ctx.stroke(); }
    // facing dot
    ctx.fillStyle='#0008'; ctx.beginPath(); ctx.arc(u.x+Math.cos(u.face)*u.size*0.45,u.y+Math.sin(u.face)*u.size*0.45,u.size*0.28,0,7); ctx.fill();
    // hp bar
    if(u.hp<u.maxHp){ const bw=u.size*2, hx=u.x-u.size, hy=u.y-u.size-8;
      ctx.fillStyle='#0009'; ctx.fillRect(hx-1,hy-1,bw+2,5);
      ctx.fillStyle = u.hp/u.maxHp>0.5?'#3fb950':(u.hp/u.maxHp>0.25?'#d29922':'#f85149');
      ctx.fillRect(hx,hy,bw*(u.hp/u.maxHp),3); }
  }

  // projectiles
  for(const p of projs){ ctx.strokeStyle=p.color; ctx.fillStyle=p.color;
    if(p.aoe){ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); }
    else { ctx.lineWidth=p.pierce?3:2; ctx.beginPath(); const l=p.pierce?14:8;
      const m=Math.hypot(p.vx,p.vy)||1; ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx/m*l,p.y-p.vy/m*l); ctx.stroke(); }
  }
  // slash / spark fx over
  for(const f of fx){ const k=f.t/f.max;
    if(f.type==='slash'){ ctx.globalAlpha=k; ctx.strokeStyle=f.color; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.len*0.6,f.ang-0.7,f.ang+0.7); ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='spark'){ ctx.globalAlpha=k; ctx.fillStyle=f.color;
      const r=(f.big?10:5)*(1+(1-k)); ctx.beginPath(); ctx.arc(f.x,f.y,r,0,7); ctx.fill(); ctx.globalAlpha=1; }
  }

  // counts
  document.getElementById('cRed').textContent  = units.filter(u=>u.alive&&u.team==='red').length;
  document.getElementById('cBlue').textContent = units.filter(u=>u.alive&&u.team==='blue').length;

  // toast
  if(toastT>0){ ctx.globalAlpha=Math.min(1,toastT); ctx.fillStyle='#ffd166'; ctx.font='bold 20px Segoe UI';
    ctx.textAlign='center'; ctx.fillText(toastMsg, W/2, 60); ctx.globalAlpha=1; ctx.textAlign='left'; }
}

/* ============================================================ LOOP */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(toastT>0) toastT-=dt;
  if(mode==='battle'&&!paused){ const steps=speed; let acc=dt*speed;
    // sub-step for high speed stability
    while(acc>0){ const s=Math.min(acc,0.0333); updateBattle(s); acc-=s; }
  }
  render();
  requestAnimationFrame(loop);
}
setMode('setup');
randomArmy();           // start with a demo battle ready to go
requestAnimationFrame(loop);
</script>
</body>
