<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iron Tide — Campaign Map Viewer</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#06101a;color:#e8f5ff;font-family:Segoe UI,system-ui,-apple-system,sans-serif;overflow:hidden}
  body{display:grid;grid-template-rows:auto 1fr;background:
    radial-gradient(circle at 50% -10%,rgba(72,150,210,.18),transparent 42%),
    linear-gradient(180deg,#07131f,#040910)}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid #1e3b54;background:rgba(5,12,20,.86);box-shadow:0 5px 24px rgba(0,0,0,.35);z-index:2}
  h1{margin:0;font-size:18px;letter-spacing:2px;color:#f5fbff;white-space:nowrap}
  .sub{color:#7fa8c2;font-size:12px;letter-spacing:.7px;white-space:nowrap}
  select,button{font:inherit;color:#e8f5ff;background:#102236;border:1px solid #315878;border-radius:9px;padding:9px 11px}
  select{min-width:min(460px,42vw)}
  button{cursor:pointer;transition:.12s}
  button:hover{background:#17344f;border-color:#6ed4ff;transform:translateY(-1px)}
  .spacer{flex:1}
  main{position:relative;display:grid;grid-template-columns:76px 1fr 76px;gap:0;min-height:0}
  .arrow{display:grid;place-items:center;padding:0 10px}
  .arrow button{width:56px;height:72%;max-height:380px;font-size:36px;font-weight:800;color:#9ee6ff;background:rgba(10,28,43,.62);border-color:#2c5e80}
  .stage{position:relative;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px}
  .panel{width:100%;height:100%;display:grid;grid-template-rows:1fr auto;gap:10px;min-height:0}
  .mapwrap{position:relative;display:flex;align-items:center;justify-content:center;min-height:0;border:1px solid #284966;border-radius:18px;background:
    linear-gradient(180deg,rgba(18,53,78,.75),rgba(6,17,28,.95));box-shadow:inset 0 0 50px rgba(0,0,0,.35),0 12px 34px rgba(0,0,0,.32);overflow:hidden}
  img{display:block;max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 12px 20px rgba(0,0,0,.45))}
  .badge{position:absolute;left:16px;top:14px;padding:7px 11px;border-radius:999px;background:rgba(3,10,17,.78);border:1px solid #315878;color:#9ee6ff;font-size:12px;letter-spacing:1px}
  .meta{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;padding:12px 14px;border:1px solid #243f58;border-radius:14px;background:rgba(5,14,23,.78)}
  #title{font-size:20px;font-weight:800;color:#fff;margin-bottom:3px}
  #theme{color:#91b8cf;font-size:13px;line-height:1.35}
  #stats{text-align:right;color:#ffd060;font-size:12px;line-height:1.55;white-space:nowrap}
  .hint{color:#62869d;font-size:12px}
  @media(max-width:760px){
    header{flex-wrap:wrap}.sub{display:none}select{min-width:100%}
    main{grid-template-columns:50px 1fr 50px}.arrow button{width:42px;font-size:28px}
    .meta{grid-template-columns:1fr}#stats{text-align:left}
  }
</style>
</head>
<body>
<header>
  <h1>IRON TIDE MAP VIEWER</h1>
  <div class="sub">one theater at a time</div>
  <select id="pick" aria-label="Choose campaign map"></select>
  <div class="spacer"></div>
  <button id="first">First</button>
  <button id="last">Last</button>
</header>
<main>
  <div class="arrow"><button id="prev" aria-label="Previous map">‹</button></div>
  <section class="stage">
    <div class="panel">
      <div class="mapwrap">
        <div class="badge" id="badge"></div>
        <img id="map" alt="Campaign map preview">
      </div>
      <div class="meta">
        <div>
          <div id="title"></div>
          <div id="theme"></div>
          <div class="hint">Use ← / → keys, the buttons, or the dropdown.</div>
        </div>
        <div id="stats"></div>
      </div>
    </div>
  </section>
  <div class="arrow"><button id="next" aria-label="Next map">›</button></div>
</main>
<script>
const maps=[
  {file:'01-training-bay.svg',name:'Training Bay',theme:'A quick shakedown in the shallows. Barely any resistance.',enemy:2,ally:4,isles:2,weather:'clear',inf:25,tanks:25},
  {file:'02-the-landing.svg',name:'The Landing',theme:'Pure land assault — no enemy fleet. Beach your tanks and take every island.',enemy:0,ally:3,isles:6,weather:'clear',inf:235,tanks:220},
  {file:'03-coastal-skirmish.svg',name:'Coastal Skirmish',theme:'A short, sharp fight in tight waters.',enemy:3,ally:4,isles:3,weather:'clear',inf:43,tanks:39},
  {file:'04-southhaven-shoals.svg',name:'Southhaven Shoals',theme:'Home waters — calm seas, a green fleet to blood.',enemy:5,ally:5,isles:5,weather:'clear',inf:53,tanks:48},
  {file:'05-the-broken-reef.svg',name:'The Broken Reef',theme:'A dense archipelago. Brutal island-by-island fighting.',enemy:6,ally:5,isles:7,weather:'clear',inf:62,tanks:57},
  {file:'06-iron-straits.svg',name:'Iron Straits',theme:'A narrow, storm-lashed channel. Nowhere to run.',enemy:7,ally:5,isles:4,weather:'storm',inf:77,tanks:71},
  {file:'07-nightfall-passage.svg',name:'Nightfall Passage',theme:'A running battle fought in the dark.',enemy:7,ally:6,isles:5,weather:'clear',inf:87,tanks:80},
  {file:'08-fogbound-marches.svg',name:'Fogbound Marches',theme:'Blind sensors. Radar and sonar are everything.',enemy:8,ally:6,isles:6,weather:'fog',inf:97,tanks:89},
  {file:'09-leviathan-s-grave.svg',name:"Leviathan's Grave",theme:'The enemy flagship yard. Bring the whole fleet.',enemy:8,ally:6,isles:6,weather:'overcast',inf:107,tanks:98},
  {file:'10-dawn-patrol.svg',name:'Dawn Patrol',theme:'First light over quiet water. It won’t stay quiet.',enemy:6,ally:5,isles:5,weather:'clear',inf:108,tanks:100},
  {file:'11-the-gauntlet.svg',name:'The Gauntlet',theme:'Badly outnumbered — nine hulls against your handful.',enemy:9,ally:3,isles:4,weather:'clear',inf:117,tanks:107},
  {file:'12-typhoon-run.svg',name:'Typhoon Run',theme:'A permanent tempest. Mountainous seas, blind guns.',enemy:7,ally:6,isles:5,weather:'storm',inf:126,tanks:116},
  {file:'13-blackwater-ambush.svg',name:'Blackwater Ambush',theme:'Fog thick as tar hides an enemy flagship.',enemy:8,ally:5,isles:6,weather:'fog',inf:147,tanks:136},
  {file:'14-island-hopping.svg',name:'Island Hopping',theme:'A wider land campaign — eight islands, no enemy fleet.',enemy:0,ally:4,isles:8,weather:'clear',inf:245,tanks:210},
  {file:'15-midnight-raid.svg',name:'Midnight Raid',theme:'A strike under permanent dark. Searchlights and tracer.',enemy:7,ally:5,isles:5,weather:'clear',inf:167,tanks:154},
  {file:'16-the-iron-armada.svg',name:'The Iron Armada',theme:'Eleven enemy warships steam over the horizon.',enemy:11,ally:6,isles:6,weather:'overcast',inf:176,tanks:162},
  {file:'17-shattered-coast.svg',name:'Shattered Coast',theme:'A sprawling reef broken into a hundred channels.',enemy:8,ally:5,isles:7,weather:'clear',inf:172,tanks:158},
  {file:'18-frozen-straits.svg',name:'Frozen Straits',theme:'Grey twilight and freezing fog off the ice shelf.',enemy:8,ally:6,isles:4,weather:'fog',inf:196,tanks:180},
  {file:'19-the-reckoning.svg',name:'The Reckoning',theme:'A stand-up brawl in a rolling storm.',enemy:9,ally:5,isles:6,weather:'storm',inf:205,tanks:189},
  {file:'20-ghost-fleet.svg',name:'Ghost Fleet',theme:'Outnumbered, alone, blind in the fog and dark.',enemy:9,ally:4,isles:5,weather:'fog',inf:216,tanks:199},
  {file:'21-volcano-bay.svg',name:'Volcano Bay',theme:'Ash-choked skies over a dense volcanic chain.',enemy:8,ally:6,isles:8,weather:'overcast',inf:241,tanks:222},
  {file:'22-last-bastion.svg',name:'Last Bastion',theme:'Ten fortified islands to storm. Armour ashore, now.',enemy:0,ally:5,isles:10,weather:'overcast',inf:275,tanks:255},
  {file:'23-the-long-night.svg',name:'The Long Night',theme:'A war that never sees the sun.',enemy:10,ally:6,isles:5,weather:'clear',inf:247,tanks:227},
  {file:'24-hurricane-alley.svg',name:'Hurricane Alley',theme:'Back-to-back storms and a heavy enemy line.',enemy:9,ally:6,isles:5,weather:'storm',inf:257,tanks:237},
  {file:'25-twin-leviathans.svg',name:'Twin Leviathans',theme:'The enemy fields its capital ships in force.',enemy:10,ally:6,isles:6,weather:'overcast',inf:267,tanks:246},
  {file:'26-the-crucible.svg',name:'The Crucible',theme:'Everything at once — fog, fleets and flagships.',enemy:11,ally:5,isles:6,weather:'fog',inf:277,tanks:255},
  {file:'27-steel-rain.svg',name:'Steel Rain',theme:'Twelve hulls and a sky full of falling shells.',enemy:12,ally:6,isles:6,weather:'storm',inf:287,tanks:264},
  {file:'28-endless-horizon.svg',name:'Endless Horizon',theme:'A vast open theater — the longest sail to the guns.',enemy:10,ally:5,isles:7,weather:'clear',inf:290,tanks:267},
  {file:'29-the-final-blockade.svg',name:'The Final Blockade',theme:'The enemy throws its whole navy at your line.',enemy:12,ally:6,isles:6,weather:'overcast',inf:300,tanks:276},
  {file:'30-ragnar-k-reef.svg',name:'Ragnarök Reef',theme:'Night, storm, and the full enemy fleet. No mercy.',enemy:12,ally:6,isles:8,weather:'storm',inf:300,tanks:286},
  {file:'31-the-last-tide.svg',name:'The Last Tide',theme:'Every gun. Every ship. This is where the war ends.',enemy:12,ally:6,isles:6,weather:'fog',inf:300,tanks:300}
];
const pick=document.getElementById('pick'), img=document.getElementById('map');
const badge=document.getElementById('badge'), title=document.getElementById('title'), theme=document.getElementById('theme'), stats=document.getElementById('stats');
let index=Number(new URLSearchParams(location.search).get('map')||0);
if(index>0) index--; if(!Number.isFinite(index)||index<0||index>=maps.length) index=0;
maps.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=String(i+1).padStart(2,'0')+' — '+m.name;pick.appendChild(o);});
function show(i){
  index=(i+maps.length)%maps.length; const m=maps[index];
  pick.value=index; img.src='campaign-maps/'+m.file; img.alt=(index+1)+'. '+m.name+' map preview';
  badge.textContent='THEATER '+(index+1)+' / '+maps.length;
  title.textContent=m.name; theme.textContent=m.theme;
  stats.innerHTML='Ships '+m.enemy+' enemy / '+m.ally+' allied<br>Islands '+m.isles+' · Weather '+m.weather.toUpperCase()+'<br>Ground '+m.inf+'% INF · '+m.tanks+'% TANKS';
  history.replaceState(null,'','?map='+(index+1));
}
document.getElementById('prev').onclick=()=>show(index-1);
document.getElementById('next').onclick=()=>show(index+1);
document.getElementById('first').onclick=()=>show(0);
document.getElementById('last').onclick=()=>show(maps.length-1);
pick.onchange=()=>show(Number(pick.value));
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(index-1); if(e.key==='ArrowRight')show(index+1);});
show(index);
</script>
</body>
</html>
