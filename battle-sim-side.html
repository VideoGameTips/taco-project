<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Battle Simulator — Side View</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0d1117; --panel:#161b22; --line:#283040; --red:#ff5050; --blue:#4da6ff; --txt:#e6edf3; --dim:#8b949e; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--txt); font-family:"Segoe UI",system-ui,sans-serif; display:flex; overflow:hidden; }
  #panel { width:300px; min-width:300px; height:100vh; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  #panel h1 { font-size:16px; padding:12px 14px; border-bottom:1px solid var(--line); letter-spacing:.5px; display:flex; gap:8px; align-items:center; }
  #panel h1 small { color:var(--dim); font-weight:400; font-size:11px; }
  .scroll { overflow-y:auto; padding:10px 12px; flex:1; }
  .scroll::-webkit-scrollbar { width:8px; } .scroll::-webkit-scrollbar-thumb { background:#2c333f; border-radius:4px; }
  .sec { margin-bottom:14px; } .sec > .lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:6px; }
  .teamrow { display:flex; gap:8px; }
  .teamrow button { flex:1; padding:9px; border:2px solid var(--line); background:#1c2330; color:var(--txt); border-radius:8px; cursor:pointer; font-weight:600; }
  .teamrow button.sel.red { border-color:var(--red); background:rgba(255,80,80,.16); color:#ffb3b3; }
  .teamrow button.sel.blue { border-color:var(--blue); background:rgba(77,166,255,.16); color:#bfe0ff; }
  .grid,.wgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .chip { display:flex; align-items:center; gap:7px; padding:7px 8px; border:1px solid var(--line); background:#1c2330; border-radius:7px; cursor:pointer; font-size:12px; user-select:none; position:relative; }
  .chip:hover { border-color:#3d4860; }
  .chip.sel { border-color:#ffd166; background:rgba(255,209,102,.12); box-shadow:0 0 0 1px #ffd16655 inset; }
  .chip .em { font-size:16px; line-height:1; } .chip .nm { font-weight:600; } .chip .st { color:var(--dim); font-size:10px; display:block; }
  .chip .tag { position:absolute; top:3px; right:4px; font-size:8px; color:var(--dim); text-transform:uppercase; }
  select { width:100%; padding:8px; background:#1c2330; color:var(--txt); border:1px solid var(--line); border-radius:7px; }
  #controls { border-top:1px solid var(--line); padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  #controls .row { display:flex; gap:8px; }
  #controls button { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px; }
  #startBtn { background:#2ea043; color:#fff; } #startBtn.battle { background:#d29922; }
  #resetBtn,#clearBtn { background:#30363d; color:var(--txt); } #randBtn { background:#1f6feb; color:#fff; }
  .speedrow { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--dim); }
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:#06080d; }
  canvas { max-width:100%; max-height:100%; box-shadow:0 0 40px #000a; }
  #hint { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--dim); background:#0009; padding:5px 12px; border-radius:20px; pointer-events:none; }
  #banner { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:#0008; pointer-events:none; }
  #banner h2 { font-size:54px; text-shadow:0 4px 20px #000; } #banner p { color:var(--dim); }
  #counts { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:18px; font-weight:700; font-size:15px; background:#000a; padding:6px 18px; border-radius:20px; }
</style>
</head>
<body>
  <div id="panel">
    <h1>🤺 Battle Sim <small>Side View</small></h1>
    <div class="scroll">
      <div class="sec"><div class="lbl">Soldier form</div><div class="grid" id="formGrid"></div></div>
      <div class="sec"><div class="lbl">Team brush</div>
        <div class="teamrow">
          <button id="teamRed" class="sel red">🔴 Red</button>
          <button id="teamBlue" class="blue">🔵 Blue</button>
        </div></div>
      <div class="sec"><div class="lbl">Skin</div><div class="grid" id="skinGrid"></div></div>
      <div class="sec"><div class="lbl">Weapon &nbsp;<span style="color:#ffd166">(dbl-click = arm everyone)</span></div><div class="wgrid" id="weaponGrid"></div></div>
      <div class="sec"><div class="lbl">🛡️ Armour</div><div class="grid" id="armorGrid"></div></div>
      <div class="sec"><div class="lbl">🚜 Vehicles</div><div class="grid" id="vehicleGrid"></div></div>
      <div class="sec"><div class="lbl">💥 Strikes &nbsp;<span style="color:#ffd166">(mark a spot)</span></div><div class="grid" id="strikeGrid"></div></div>
      <div class="sec"><div class="lbl">Map</div><select id="mapSel"></select></div>
    </div>
    <div id="controls">
      <div class="speedrow">Speed <input type="range" id="speed" min="0.25" max="3" step="0.25" value="1"><span id="speedVal">1×</span></div>
      <div class="row"><button id="randBtn">🎲 Random Army</button><button id="clearBtn">🗑 Clear</button></div>
      <div class="row"><button id="resetBtn">↺ Reset</button><button id="startBtn">▶ Start</button></div>
    </div>
  </div>
  <div id="stage">
    <canvas id="cv" width="1280" height="720"></canvas>
    <div id="hint">Click to place a fighter • drag to place many • right-click to delete</div>
    <div id="counts"><span style="color:var(--red)" id="cRed">0</span><span style="color:var(--dim)">vs</span><span style="color:var(--blue)" id="cBlue">0</span></div>
    <div id="banner"><h2 id="bTitle"></h2><p>Press Reset to set up again</p></div>
  </div>

/* ===================== TERRAIN HELPERS ===================== */
// highest platform surface at x that is at/below cursorY (for placement). Returns top y or null.
function surfaceUnder(x, y){ let best=null;
  for(const p of plats){ if(x>=p.x&&x<=p.x+p.w && p.y>=y-6){ if(best===null||p.y<best) best=p.y; } }
  return best;
}
function inWall(x,y){ return plats.some(p=> x>p.x&&x<p.x+p.w&&y>p.y&&y<p.y+p.h); }
// is the straight line from (x0,y0)→(x1,y1) free of terrain? (line-of-fire check)
function clearShot(x0,y0,x1,y1){ const dx=x1-x0,dy=y1-y0,dist=Math.hypot(dx,dy),steps=Math.max(2,(dist/9)|0);
  for(let i=1;i<steps;i++){ const t=i/steps; if(inWall(x0+dx*t,y0+dy*t)) return false; } return true; }

/* ===================== UNITS / PLACEMENT ===================== */
const BLUE_C=['usa','canada','mexico','germany','uk','skorea','france'];
const RED_C =['ussr','russia','china','vietnam','japan','nkorea','cuba'];
const pickCountry = team => (team==='red'?RED_C:BLUE_C)[(Math.random()*7)|0];
function makeUnit(x,feetY,team,skinId,weaponId,armorId='none'){
  const s=skinById(skinId), ar=armorById(armorId), hp=s.hp+ar.hp;
  return { team, skin:skinId, weapon:weaponId, armor:armorId, country:pickCountry(team), x, y:feetY, sx:x, sy:feetY,
    vx:0, vy:0, onGround:false, face: team==='red'?1:-1,
    hp, maxHp:hp, size:s.size, speed:s.speed,
    cd:0, target:null, retarget:0, alive:true, slow:0,
    swing:0, hit:0, flash:0, recoil:0, aim:undefined, moving:false, walk:0,
    climbing:false, climbWall:null, lean:0, leanV:0, hipKick:0, hipKickV:0, lock:null, deadT:0, ragA:0, ragV:0, ragTarget:0 };
}
function spawnUnit(x,y){
  const s=skinById(brush.skin); if(x<14||x>W-14) return;
  let top=surfaceUnder(x,y); if(top===null) top=y;       // no ground under cursor → drop (may fall into pit)
  units.push(makeUnit(x,top,brush.team,brush.skin,brush.weapon,brush.armor));
}
function makeVehicle(x,baseY,team,vid){ const vt=vehById(vid); const air=vt.domain==='air';
  return { kind:'vehicle', vt, vid, domain:vt.domain, team, x, y: air?vt.alt:baseY, sx:x, sy: air?vt.alt:baseY,
    vx:0, vy:0, onGround:false, face: team==='red'?1:-1, hp:vt.hp, maxHp:vt.hp, size:Math.max(vt.w,vt.h)/2,
    cd:Math.random()*vt.fireCd, target:null, retarget:0, lock:null, alive:true, hit:0, flash:0, recoil:0, aim: team==='red'?0:Math.PI,
    moving:false, walk:0, bob:Math.random()*6, deadT:0, ragA:0, ragV:0, crashFall:false, slow:0 };
}
function spawnVehicle(x,y){ const vt=vehById(brush.vehicle); if(!vt||x<40||x>W-40) return;
  if(vt.domain==='air'){ units.push(makeVehicle(x,0,brush.team,brush.vehicle)); }
  else { let top=surfaceUnder(x,y); if(top===null) top=GY; units.push(makeVehicle(x,top,brush.team,brush.vehicle)); }
}
// generic body geometry (units = tall humanoid; vehicles = box)
function bodyCY(u){ return u.y - u.size*1.4 - u.size*0.65; } // humanoid torso center
function centerY(u){ if(u.kind==='vehicle'){ return u.domain==='air'? u.y : u.y - u.vt.h/2; } return bodyCY(u); }
function halfW(u){ return u.kind==='vehicle'? u.vt.w/2 : u.size*1.1; }
function halfH(u){ return u.kind==='vehicle'? u.vt.h/2 : u.size*1.7; }
function unitAt(x,y){ return units.find(u=>{ const cy=centerY(u);
  const hw=u.kind==='vehicle'?u.vt.w/2:u.size*1.3, hh=u.kind==='vehicle'?u.vt.h/2+6:u.size*2.2;
  return Math.abs(u.x-x)<hw && Math.abs(cy-y)<hh; }); }

addEventListener('mousemove',e=>{ if(!dragging||mode!=='setup')return; const p=toWorld(e);

function toWorld(e){ const r=cv.getBoundingClientRect(); return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) }; }

let toastT=0,toastMsg='';

  else if(mode==='battle'){ paused=!paused; startBtn.textContent=paused?'▶ Resume':'⏸ Pause'; }
  else if(mode==='over') resetBattle(); }
function startBattle(){ paused=false; projs=[];fx=[];hazards=[];screenFlash=0; strikes.forEach(m=>{m.fired=false;m.t=m.max;}); units.forEach(u=>{u.sx=u.x;u.sy=u.y;}); setMode('battle'); }
function resetBattle(){ projs=[];fx=[];hazards=[];screenFlash=0; strikes.forEach(m=>{m.fired=false;m.t=m.max;}); units.forEach(u=>{
  u.x=u.sx;u.y=u.sy;u.vx=0;u.vy=0;u.onGround=false;u.alive=true;u.cd=0;u.target=null;

  else { const s=skinById(u.skin), ar=armorById(u.armor); u.hp=s.hp+ar.hp;u.maxHp=s.hp+ar.hp;u.swing=0; }

/* ===================== COMBAT ===================== */
const GRAV=1500, JUMP=560, BASE=80, AIRCTRL=0.25;
function nearestEnemy(u){
  const melee = u.kind==='unit' && wepById(u.weapon).cat==='melee';
  let best=null,bd=Infinity, fb=null,fd=Infinity, cyU=centerY(u);
  for(const e of units){ if(!e.alive||e.team===u.team)continue;
    const d=(e.x-u.x)**2+(centerY(e)-cyU)**2;
    if(d<fd){fd=d;fb=e;}
    if(melee && e.kind==='vehicle' && e.domain==='air') continue;   // ground melee can't reach planes
    if(d<bd){bd=d;best=e;} }
  return best||fb;
}
function damage(t,dmg,kx,ky,src,soft){ if(!t.alive)return;
  if(src && src!==t && src.alive && src.team!==t.team){            // retaliate: lock onto whoever shot you
    const tMelee = t.kind==='unit' && wepById(t.weapon).cat==='melee';
    if(!(tMelee && src.kind==='vehicle' && src.domain==='air')){ t.lock=src; t.target=src; t.retarget=0.6; }
  }
  if(t.kind!=='vehicle') dmg*=(1-armorById(t.armor).dr);   // tactical armour soaks damage
  t.hp-=dmg; t.hit=1;
  if(t.kind==='vehicle'){
    if(t.hp<=0){ t.alive=false; t.deadT=0; t.crashFall=(t.domain==='air'); if(t.domain==='air'){t.vy=40;t.ragV=(Math.random()-0.5)*5;}
      explode(t.x, centerY(t), t.team, 45, t.vt.w*0.85); }           // wreck blast hurts nearby enemies
    else flash(t.x, centerY(t), t.team==='red'?'#ff8c8c':'#9fc8ff');
    return;
  }
  if(!soft){ if(kx!==undefined){ t.vx+=kx; t.vy+=ky; t.onGround=false; }
    t.leanV += (kx!==undefined? Math.sign(kx||1) : 1)*3.2; }        // hit jolt — skipped for fire/flame (no ragdoll)
  if(t.hp<=0){ t.alive=false; t.deadT=0; t.vy-=120;                       // collapse toward the ground
    t.ragTarget=((kx||(Math.random()-0.5))>=0?1:-1)*(Math.PI*0.5 + (Math.random()*0.3-0.15));
    flash(t.x,bodyCY(t),'#fff',true); }
  else flash(t.x,bodyCY(t), t.team==='red'?'#ff8c8c':'#9fc8ff'); }
function explode(x,y,team,dmg,rad,owner){ fx.push({type:'boom',x,y,r:rad,t:0.32,max:0.32});
  if(dmg<=0) return;
  for(const e of units){ if(!e.alive||e.team===team)continue; const cy=centerY(e),d=Math.hypot(e.x-x,cy-y);
    if(d<rad){ const a=Math.atan2(cy-y,e.x-x); damage(e, dmg*(1-d/rad)+dmg*0.3, Math.cos(a)*340, Math.sin(a)*340-120, owner); } } }
function flash(x,y,c,big){ fx.push({type:'spark',x,y,color:c,t:0.18,max:0.18,big:!!big}); }
function muzzleFX(mx,my,ang,color){
  fx.push({type:'blast',x:mx,y:my,ang,color,t:0.09,max:0.09});                              // shockwave + hot cone
  for(let i=0;i<2;i++) fx.push({type:'smoke',x:mx,y:my,vx:Math.cos(ang)*18+(Math.random()-0.5)*12,vy:-14-Math.random()*12,t:0.55+Math.random()*0.35,max:0.9,r:3+Math.random()*2}); // afterburn
  for(let i=0;i<3;i++) fx.push({type:'ember',x:mx,y:my,vx:Math.cos(ang)*(70+Math.random()*70)+(Math.random()-0.5)*30,vy:Math.sin(ang)*50+(Math.random()-0.5)*45,t:0.16+Math.random()*0.14,max:0.3,color}); // sparks
}
function spawnHazard(x,y,team,kind,owner,dmg){
  if(kind==='c4'){ hazards.push({ x, y:Math.min(y,GY-2), team, owner, det:true, dmg:dmg||140, r:115, t:1.4, max:1.4 }); return; }
  const fire=kind==='fire';
  hazards.push({ x, y:Math.min(y,GY-2), team, r:fire?62:72, dps:fire?26:5, slow:!fire, t:fire?3:4, max:fire?3:4, fire }); }
function projDie(p){ if(p.aoe) explode(p.x,p.y,p.team,p.dmg,p.aoe,p.owner);
  if(p.hazard) spawnHazard(p.x,p.y,p.team,p.hazard,p.owner,p.dmg);
  if(p.nuke) screenFlash=1; }
function launchStrike(m){ const st=strikeById(m.sid);
  if(st.kind==='ground'){ const left=m.team==='red', x0=left?12:W-12, dir=left?1:-1;
    projs.push({ x:x0, y:GY-14, vx:dir*st.speed, vy:0, dmg:st.dmg, team:m.team, color:st.color, aoe:st.aoe, knock:520, life:8, r:6, strike:true, detX:m.x }); }
  else if(st.carpet){ for(let i=0;i<6;i++){ const ox=m.x-150+i*60;
    projs.push({ x:ox, y:-30-Math.random()*60, vx:0, vy:st.fall, dmg:st.dmg, team:m.team, color:st.color, aoe:st.aoe, knock:300, life:8, r:5, strike:true }); } }
  else { projs.push({ x:m.x, y:-30, vx:0, vy:st.fall, dmg:st.dmg, team:m.team, color:st.color, aoe:st.aoe, knock:st.nuke?900:420, life:8, r:7, strike:true, nuke:st.nuke }); } }
function shoot(u,w,tx,ty){ const sx=u.x+u.face*u.size, sy=bodyCY(u);
  if(w.lob){ const dxx=tx-sx, dyy=ty-sy, tf=Math.max(0.6,Math.min(1.6,Math.hypot(dxx,dyy)/260));
    const vx=dxx/tf, vy=(dyy-0.5*GRAV*tf*tf)/tf;
    projs.push({ x:sx, y:sy, vx, vy, dmg:w.dmg, team:u.team, owner:u, color:w.color, aoe:w.aoe||0, knock:w.knock||0,
      grav:true, hazard:w.hazard||null, life:tf+1.4, r:6 });
    u.flash=0.05; u.recoil=0.4; return; }
  const base=Math.atan2(ty-sy,tx-sx), pel=w.pellets||1;
  for(let i=0;i<pel;i++){ const a=base+(Math.random()-0.5)*(w.spread||0);
    projs.push({ x:sx+Math.cos(base)*u.size, y:sy+Math.sin(base)*u.size, vx:Math.cos(a)*w.speed, vy:Math.sin(a)*w.speed,
      dmg:w.dmg, team:u.team, owner:u, color:w.color, aoe:w.aoe||0, pierce:!!w.pierce, slow:w.slow||0, knock:w.knock||0, soft:!!w.soft,
      life:w.pierce?99:(w.life||(w.range/w.speed)+0.05), r:w.aoe?5:(w.pierce?2.5:3) }); }
  const mx=sx+Math.cos(base)*u.size*1.5, my=sy+Math.sin(base)*u.size*1.5;
  muzzleFX(mx,my,base,w.color);
  u.recoil=Math.min(1.6, 0.45 + w.dmg/70 + (w.aoe?0.4:0));            // gun kick scales with caliber
  u.vx -= u.face*Math.min(150, w.dmg*1.1 + (w.aoe||0));               // shooter shoved back
  u.leanV += -u.face*(0.6 + Math.min(0.7, w.dmg*0.012));             // slight torso rock
  u.hipKickV += -u.face*Math.min(120, 30 + w.dmg*1.2);              // hips/thighs drive backward (recoil brace)
  u.flash=0.07; }

function vehicleFire(u,vt,tx,ty){
  const sx=u.x+u.face*vt.w*0.42, sy=centerY(u);
  if(vt.proj==='bomb'){
    projs.push({ x:u.x, y:u.y+vt.h/2, vx:u.vx*0.5, vy:60, dmg:vt.dmg, team:u.team, owner:u, color:vt.pcolor, aoe:vt.aoe, knock:vt.knock, grav:true, life:6, r:7 });
  } else if(vt.proj==='arc'){
    const dx=tx-sx, dy=ty-sy, tf=1.35, vx=dx/tf, vy=(dy-0.5*GRAV*tf*tf)/tf;
    projs.push({ x:sx, y:sy, vx, vy, dmg:vt.dmg, team:u.team, owner:u, color:vt.pcolor, aoe:vt.aoe, knock:vt.knock, grav:true, life:tf+1.2, r:7 });
  } else {
    const pel=vt.pellets||1;
    for(let i=0;i<pel;i++){ const a=Math.atan2(ty-sy,tx-sx)+(Math.random()-0.5)*(vt.spread||0.05);
      projs.push({ x:sx, y:sy, vx:Math.cos(a)*vt.pspeed, vy:Math.sin(a)*vt.pspeed, dmg:vt.dmg, team:u.team, owner:u, color:vt.pcolor,
        aoe:vt.aoe||0, knock:vt.knock, pierce:!!vt.pierce, life:vt.pierce?99:(vt.range/vt.pspeed)+0.1, r:vt.aoe?5:(vt.pierce?2.5:3) }); }
  }
  if(vt.proj!=='bomb'){ const a=u.aim||0, mx=u.x+Math.cos(a)*vt.w*0.5, my=centerY(u)+Math.sin(a)*vt.w*0.5;
    muzzleFX(mx,my,a,vt.pcolor); u.recoil=Math.min(1.8, 0.6 + vt.dmg/90);
    if(u.domain==='ground') u.vx -= u.face*Math.min(70, vt.dmg*0.4); }
  u.flash=0.07;
}

function updateVehicle(u,dt){
  const vt=u.vt;
  if(!u.alive){ u.deadT+=dt;
    if(u.crashFall){ u.vy+=GRAV*dt; u.x+=u.vx*dt; u.y+=u.vy*dt; u.ragA+=(u.ragV||0)*dt;
      if(u.y>=GY-vt.h/2){ u.y=GY-vt.h/2; u.vy=0; u.vx*=0.7; u.crashFall=false; if(Math.abs(u.vy)<5)u.ragV*=0.5; } }
    return; }
  u.cd-=dt*1000; if(u.hit>0)u.hit-=dt*5; if(u.flash>0)u.flash-=dt; if(u.recoil>0)u.recoil-=dt*9; u.retarget-=dt;
  if(u.lock && (!u.lock.alive || u.lock.team===u.team)) u.lock=null;
  if(u.lock) u.target=u.lock;                                          // retaliate against attacker
  else if(!u.target||!u.target.alive||u.retarget<=0){ u.target=nearestEnemy(u); u.retarget=0.5+Math.random()*0.4; }
  const t=u.target, cyU=centerY(u);
  if(t){
    const tcx=t.x, tcy=centerY(t), dx=tcx-u.x, dy=tcy-cyU, d=Math.hypot(dx,dy);
    u.face = dx>=0?1:-1; u.aim=Math.atan2(dy,dx);
    const sp=vt.speed*BASE;
    if(u.domain==='ground'){
      const prefer=vt.range*0.7;
      if(Math.abs(dx)>prefer){ u.vx+=Math.sign(dx)*sp*dt*8; u.moving=true; } else u.moving=false;
      u.vx=Math.max(-sp,Math.min(sp,u.vx));
      u.vy+=GRAV*dt; const pf=u.y; u.x+=u.vx*dt; u.y+=u.vy*dt;
      if(u.x<vt.w/2){u.x=vt.w/2;} if(u.x>W-vt.w/2){u.x=W-vt.w/2;}
      u.onGround=false;
      if(u.vy>=0){ for(const p of plats){ if(u.x>=p.x-2&&u.x<=p.x+p.w+2 && pf<=p.y+2 && u.y>=p.y){ u.y=p.y; u.vy=0; u.onGround=true; break; } } }
      if(u.onGround) u.vx*=0.85;
      if(u.y>H+160){ u.alive=false; u.deadT=99; }
    } else {
      u.vx+=Math.sign(dx||1)*sp*dt*6; u.vx=Math.max(-sp,Math.min(sp,u.vx)); u.x+=u.vx*dt;
      if(u.x<vt.w/2){u.x=vt.w/2;u.vx*=-1;} if(u.x>W-vt.w/2){u.x=W-vt.w/2;u.vx*=-1;}
      let desiredY=vt.alt; if(vt.hover) desiredY=Math.max(90,Math.min(GY-130, tcy-150));
      u.bob+=dt*3; u.y += (desiredY+Math.sin(u.bob)*6 - u.y)*Math.min(1,dt*2.5);
      u.moving=Math.abs(u.vx)>6;
    }
    if(u.cd<=0){
      if(vt.proj==='bomb'){ if(Math.abs(dx)<90 && tcy>cyU){ u.cd=vt.fireCd; vehicleFire(u,vt,tcx,tcy); } } // drop when overhead
      else if(d<=vt.range){ u.cd=vt.fireCd; vehicleFire(u,vt,tcx,tcy); }
    }
  }
  if(u.moving) u.walk+=dt*8;
}

function physics(u,dt){
  if(u.alive && u.climbing && u.climbWall){            // scaling a wall
    const p=u.climbWall, r=u.size*0.55;
    u.y -= 150*dt; u.vy=0;
    u.x = u.face>0 ? p.x-r : p.x+p.w+r;                // hug the wall face
    if(u.y <= p.y){ u.y=p.y; u.onGround=true; u.climbing=false; u.climbWall=null; u.x += u.face*(r+3); } // mount top
    return;
  }
  u.vy+=GRAV*dt;
  const prevFeet=u.y, prevX=u.x;
  u.x+=u.vx*dt; u.y+=u.vy*dt;
  if(u.x<8){u.x=8;u.vx*=-0.3;} if(u.x>W-8){u.x=W-8;u.vx*=-0.3;}
  u.onGround=false;
  if(u.vy>=0){ for(const p of plats){ if(u.x>=p.x-2&&u.x<=p.x+p.w+2 && prevFeet<=p.y+1 && u.y>=p.y){
    u.y=p.y; u.vy=0; u.onGround=true; break; } } }
  // side collision: can't walk through a wall (climb-hop clears low ledges before reaching them)
  if(u.alive){ const r=u.size*0.55, headY=u.y-u.size*3.5;
    for(const p of plats){
      if(u.y>p.y+3 && (p.y+p.h)>headY && u.x+r>p.x && u.x-r<p.x+p.w){
        if(prevX+r<=p.x+1) u.x=p.x-r;                 // approached from the left
        else if(prevX-r>=p.x+p.w-1) u.x=p.x+p.w+r;    // approached from the right
      }
    }
  }
  if(u.onGround){ u.vx*=0.8; if(!u.alive){ u.ragV*=0.7; } }
  if(u.y>H+140){ u.alive=false; u.deadT=99; }   // fell into a pit / off the map
}

function updateBattle(dt){
  for(const u of units){
    if(u.kind==='vehicle'){ updateVehicle(u,dt); continue; }
    if(!u.alive){ physics(u,dt); u.deadT+=dt; u.ragA += (u.ragTarget-u.ragA)*Math.min(1,dt*7); continue; }  // crumple to ground
    u.cd-=dt*1000; if(u.swing>0)u.swing-=dt*5; if(u.hit>0)u.hit-=dt*5; if(u.flash>0)u.flash-=dt; if(u.recoil>0)u.recoil-=dt*9;
    u.leanV += (-u.lean*55 - u.leanV*7)*dt; u.lean += u.leanV*dt; if(u.lean>1)u.lean=1; else if(u.lean<-1)u.lean=-1;  // semi-ragdoll spring
    u.hipKickV += (-u.hipKick*60 - u.hipKickV*9)*dt; u.hipKick += u.hipKickV*dt; const hk=u.size*0.9; if(u.hipKick>hk)u.hipKick=hk; else if(u.hipKick<-hk)u.hipKick=-hk;
    if(u.slow>0)u.slow-=dt; u.retarget-=dt; u.moving=false;
    if(u.lock && (!u.lock.alive || u.lock.team===u.team)) u.lock=null;
    if(u.lock) u.target=u.lock;                                       // stay on your attacker until they die
    else if(!u.target||!u.target.alive||u.retarget<=0){ u.target=nearestEnemy(u); u.retarget=0.4+Math.random()*0.3; }
    const t=u.target, w=wepById(u.weapon);
    if(t){
      const dx=t.x-u.x, cyU=bodyCY(u), cyT=centerY(t), dy=cyT-cyU, d=Math.hypot(dx,dy);
      u.face = dx>=0?1:-1;
      const los = (w.cat==='ranged' && !w.lob) ? clearShot(u.x,cyU,t.x,cyT) : true;
      const reach = w.cat==='melee' ? w.range + u.size + (t.size||14)*0.5 : w.range;  // blade swings from the body edge
      const prefer = w.cat==='melee'? reach*0.6 : w.range*0.7;
      const sp = u.speed*BASE*(u.slow>0?0.45:1)*armorById(u.armor).spd;
      const ctrl = u.onGround?1:AIRCTRL;
      if(w.cat==='ranged' && !los){ u.vx += Math.sign(dx)*sp*ctrl*dt*8; u.moving=true; }   // shot blocked → advance for a clear line
      else if(Math.abs(dx)>prefer){ u.vx += Math.sign(dx)*sp*ctrl*dt*8; u.moving=true; }
      else if(w.cat==='ranged' && Math.abs(dx)<w.range*0.32){ u.vx -= Math.sign(dx)*sp*ctrl*dt*6; u.moving=true; }
      u.vx = Math.max(-sp,Math.min(sp,u.vx));
      // climb: hop up onto a ledge directly ahead (within climbable height)
      if(u.onGround && u.moving){ const ahead=u.x+u.face*(u.size+9);
        for(const p of plats){ if(ahead>=p.x && ahead<=p.x+p.w){ const h=u.y-p.y;
          if(h>6 && h<=u.size*7){ u.vy=-Math.sqrt(2*GRAV*(h+14)); break; } } } }
      if(w.cat==='ranged') u.aim=Math.atan2(cyT-cyU,t.x-u.x);
      // attack
      if(d<=reach && u.cd<=0 && los){ u.cd=w.cd;
        if(w.cat==='melee'){ u.swing=1;
          const kx=u.face*w.knock, ky=-w.knock*0.55;
          damage(t,w.dmg,kx,ky,u);
          fx.push({type:'slash',x:u.x+u.face*u.size,y:cyU,face:u.face,len:reach,color:w.color,t:0.16,max:0.16});
        } else shoot(u,w,t.x,cyT);
      }
    }
    // separation (horizontal) so they don't perfectly overlap
    for(const a of units){ if(a===u||!a.alive||a.kind==='vehicle')continue; const dx=u.x-a.x;
      if(Math.abs(dx)<u.size+a.size && Math.abs(u.y-a.y)<u.size*2){ u.vx += Math.sign(dx||1)*40*dt*8; } }
    if(u.moving) u.walk += dt*10*(u.slow>0?0.5:1);
    // ledge guard: don't step off into a deadly gap (no platform to land on or climb ahead)
    if(u.onGround && Math.abs(u.vx)>1){ const dir=Math.sign(u.vx), ahead=u.x+dir*(u.size+6);
      let safe=false; for(const p of plats){ if(ahead>=p.x && ahead<=p.x+p.w && p.y>=u.y-u.size*7){ safe=true; break; } }
      if(!safe) u.vx=0; }
    // wall climbing: scale a wall too tall to hop, then mount the top
    if(u.alive && u.onGround && u.moving && !u.climbing){ const ahead=u.x+u.face*(u.size+5);
      for(const p of plats){ if(ahead>=p.x-3 && ahead<=p.x+p.w+3 && (u.y-p.y)>u.size*7 && (p.y+p.h)>u.y-u.size*3){ u.climbing=true; u.climbWall=p; break; } } }
    physics(u,dt);
  }
  // projectiles (straight-line; bombs/shells use gravity)
  for(const p of projs){ if(p.grav) p.vy+=GRAV*dt; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.strike){ if(Math.random()<0.7) fx.push({type:'smoke',x:p.x,y:p.y,vx:(Math.random()-0.5)*12,vy:-6,t:0.5,max:0.7,r:3+Math.random()*2});
      if(p.detX!==undefined && Math.sign(p.vx)*(p.x-p.detX)>=0){ projDie(p); p.dead=true; continue; } }   // torpedo reaches target
    if(p.life<=0||p.x<0||p.x>W||(p.y<0&&!p.strike)||p.y>H||inWall(p.x,p.y)){ projDie(p); p.dead=true; continue; }
    for(const e of units){ if(!e.alive||e.team===p.team)continue; const cy=centerY(e);
      if(Math.abs(e.x-p.x)<halfW(e) && Math.abs(cy-p.y)<halfH(e)){
        if(p.pierce){ if(p.hit&&p.hit.has(e)) continue;          // never hit the same target twice
          if((p.hitCount||0)>=3){ p.dead=true; break; }          // pierce cap: 3 soldiers, then gone
          (p.hit||(p.hit=new Set())).add(e); p.hitCount=(p.hitCount||0)+1; }
        if(p.aoe){ projDie(p); p.dead=true; break; }
        const a=Math.atan2(p.vy,p.vx); damage(e,p.dmg,Math.cos(a)*p.knock,Math.sin(a)*p.knock-p.knock*0.3,p.owner,p.soft); if(p.slow)e.slow=Math.max(e.slow,1.2);
        if(!p.pierce){ p.dead=true; break; } } }
  }
  projs=projs.filter(p=>!p.dead);
  // ground hazards (molotov fire / gas cloud)
  for(const h of hazards){ h.t-=dt;
    if(h.det){ if(h.t<=0) explode(h.x,h.y,h.team,h.dmg,h.r,h.owner); continue; }   // C4 detonates at end of fuse
    for(const e of units){ if(!e.alive||e.team===h.team)continue;
      if(Math.abs(e.x-h.x)<h.r && Math.abs(e.y-h.y)<70){ damage(e, h.dps*dt, undefined,undefined,undefined,true); if(h.slow)e.slow=Math.max(e.slow,1.1); } } }
  hazards=hazards.filter(h=>h.t>0);
  // called-in strikes count down then launch (one use)
  for(const m of strikes){ if(m.fired)continue; m.t-=dt; if(m.t<=0){ launchStrike(m); m.fired=true; } }
  if(screenFlash>0) screenFlash-=dt*1.6;
  for(const f of fx){ f.t-=dt; if(f.vx!==undefined){ f.x+=f.vx*dt; f.y+=f.vy*dt; if(f.type==='ember')f.vy+=420*dt; else if(f.type==='smoke')f.vx*=0.96; } } fx=fx.filter(f=>f.t>0);
  // remove units that fell far away
  units=units.filter(u=> u.alive || u.deadT < (u.kind==='vehicle'?4:10));   // corpses linger 10s
  const r=units.filter(u=>u.alive&&u.team==='red').length, b=units.filter(u=>u.alive&&u.team==='blue').length;
  if((r===0||b===0) && units.length){ setMode('over'); const bt=document.getElementById('bTitle');
    if(r===0&&b===0){bt.textContent='Mutual Destruction';bt.style.color='#fff';}
    else if(b===0){bt.textContent='🔴 Red Wins!';bt.style.color='var(--red)';}
    else {bt.textContent='🔵 Blue Wins!';bt.style.color='var(--blue)';} }
}

function drawHumanoid(u){
  const s=u.size, sk=skinById(u.skin), w=wepById(u.weapon), f=u.face;
  const legLen=s*1.4, torso=s*1.3, headR=s*0.6, armLen=s*1.05, neck=s*0.3;
  const feetY=u.y, hipY=feetY-legLen, shY=hipY-torso, headCY=shY-neck-headR;
  ctx.save();
  if(!u.alive){ ctx.translate(u.x,u.y); ctx.rotate(u.ragA); ctx.translate(-u.x,-u.y); ctx.globalAlpha=Math.max(0,Math.min(1,(10-u.deadT)/3)); }  // collapse from feet, fade last 3s
  ctx.lineCap='round'; ctx.strokeStyle = u.hit>0?'#fff':sk.color;
  const hipKick=u.hipKick||0, hipX=u.x+hipKick;        // recoil pushes hips/thighs back, feet stay planted
  // legs (two-bone IK: knee bends forward, foot swings + lifts through the stride)
  ctx.lineWidth=Math.max(2.5,s*0.3);
  for(const ph of [0, Math.PI]){ const wlk=u.walk+ph;
    const off  = (u.moving? Math.sin(wlk)*0.33 : 0.07*(ph?1:-1))*legLen;
    const lift = (u.moving? Math.max(0,Math.sin(wlk))*0.16 : 0)*legLen;
    legIK(hipX,hipY, u.x+f*off, u.y-lift, legLen*0.52, legLen*0.52, -f); }
  // semi-ragdoll: upper body leans (small) + rides the hip recoil; tiny sway while walking
  const lean = u.lean + (u.moving? Math.sin(u.walk)*0.05 : 0);
  ctx.save(); ctx.translate(hipKick,0); ctx.translate(u.x,hipY); ctx.rotate(lean); ctx.translate(-u.x,-hipY);
  // torso
  ctx.beginPath(); ctx.moveTo(u.x,hipY); ctx.lineTo(u.x,shY); ctx.stroke();
  // back arm (two-segment, swings opposite the legs, elbow bends)
  ctx.lineWidth=Math.max(2,s*0.24);
  { const sa=Math.PI*0.5 + f*(u.moving? Math.sin(u.walk+Math.PI)*0.5 : 0.18);
    const sxp=u.x, syp=shY+s*0.12, bhx=sxp+Math.cos(sa)*armLen*0.95, bhy=syp+Math.sin(sa)*armLen*0.95;
    arm2(sxp,syp,bhx,bhy); }
  // head
  ctx.beginPath(); ctx.arc(u.x,headCY,headR,0,7); ctx.fillStyle=u.hit>0?'#fff':sk.color; ctx.fill();
  ctx.lineWidth=Math.max(2,s*0.18); ctx.strokeStyle=u.team==='red'?'#ff5050':'#4da6ff';
  ctx.beginPath(); ctx.arc(u.x,headCY,headR,0,7); ctx.stroke();
  ctx.fillStyle='#0009'; ctx.beginPath(); ctx.arc(u.x+f*headR*0.4,headCY-headR*0.05,headR*0.2,0,7); ctx.fill();
  // freeze tint
  if(u.slow>0){ ctx.strokeStyle='#9fe3ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(u.x,headCY,headR+3,0,7); ctx.stroke(); }
  // tactical armour overlay
  const av=armorById(u.armor);
  if(av.color){ ctx.fillStyle=u.hit>0?'#fff':av.color; ctx.strokeStyle='#0007'; ctx.lineWidth=Math.max(1,s*0.08);
    rr(u.x-s*0.5, shY+s*0.02, s*1.0, (hipY-shY)-s*0.04, s*0.16); ctx.fill(); ctx.stroke();         // chest plate
    if(av.dr>=0.4){ ctx.beginPath(); ctx.arc(u.x-s*0.5,shY+s*0.2,s*0.3,0,7); ctx.arc(u.x+s*0.5,shY+s*0.2,s*0.3,0,7); ctx.fill(); } // pauldrons
    if(av.dr>=0.3){ ctx.beginPath(); ctx.arc(u.x,headCY,headR*1.08,Math.PI*1.03,Math.PI*1.97); ctx.fill(); ctx.stroke(); } // helmet
  }
  // front arm + weapon
  let aArm;
  if(w.cat==='ranged'){ aArm = (u.aim!==undefined?u.aim : (f>0?0:Math.PI)); }
  else { const sw=u.swing>0?u.swing:0; aArm = f>0 ? (-0.5 + (1-sw)*1.7) : (Math.PI+0.5 - (1-sw)*1.7); }
  const shX=u.x, shYp=shY+s*0.12;
  const hx=shX+Math.cos(aArm)*armLen, hy=shYp+Math.sin(aArm)*armLen;
  ctx.lineWidth=Math.max(2.5,s*0.28); ctx.strokeStyle=u.hit>0?'#fff':sk.color;
  arm2(shX,shYp,hx,hy);
  // weapon
  ctx.save(); ctx.translate(hx,hy); ctx.rotate(aArm); if(f<0) ctx.scale(1,-1);
  if(u.recoil>0){ ctx.translate(-u.recoil*s*0.5,0); ctx.rotate(-u.recoil*0.18); }   // kick back + muzzle climb
  drawWeaponGfx(w,s,u); ctx.restore();
  ctx.restore();   // end upper-body lean
  // hp bar
  if(u.alive && u.hp<u.maxHp){ const bw=s*2.2, bx=u.x-bw/2, by=headCY-headR-9;
    ctx.fillStyle='#0009'; ctx.fillRect(bx-1,by-1,bw+2,5);
    ctx.fillStyle=u.hp/u.maxHp>0.5?'#3fb950':(u.hp/u.maxHp>0.25?'#d29922':'#f85149');
    ctx.fillRect(bx,by,bw*Math.max(0,u.hp/u.maxHp),3); }
  ctx.restore();
  function legIK(hx,hy,fx,fy,l1,l2,side){           // two-bone IK, knee offset to one side
    let dx=fx-hx, dy=fy-hy, dist=Math.hypot(dx,dy); const maxr=l1+l2-0.01;
    if(dist>maxr){ dx*=maxr/dist; dy*=maxr/dist; fx=hx+dx; fy=hy+dy; dist=maxr; } dist=dist||0.001;
    const a=(dist*dist+l1*l1-l2*l2)/(2*dist), hgt=Math.sqrt(Math.max(0,l1*l1-a*a));
    const ux=dx/dist, uy=dy/dist, bx=hx+ux*a, by=hy+uy*a;
    const kx=bx+(-uy)*hgt*side, ky=by+(ux)*hgt*side;
    ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(kx,ky); ctx.lineTo(fx,fy); ctx.stroke(); }
  function arm2(sx2,sy2,hx2,hy2){ const mx=(sx2+hx2)/2,my=(sy2+hy2)/2, dx=hx2-sx2,dy=hy2-sy2,len=Math.hypot(dx,dy)||1;
    let px=-dy/len,py=dx/len; if(py<0){px=-px;py=-py;}                       // elbow bends downward
    const bend=Math.min(len*0.32, s*0.5), ex=mx+px*bend, ey=my+py*bend;
    ctx.beginPath(); ctx.moveTo(sx2,sy2); ctx.lineTo(ex,ey); ctx.lineTo(hx2,hy2); ctx.stroke(); }
}

function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawVehicle(u){
  const vt=u.vt, g=vt.gfx||vt.id, f=u.face, cx=u.x, cy=centerY(u), hw=vt.w/2, hh=vt.h/2;
  const body=u.hit>0?'#fff':vt.color, team=u.team==='red'?'#ff5050':'#4da6ff';
  ctx.save();
  if(!u.alive){ ctx.globalAlpha=Math.max(0,1-u.deadT/4); ctx.translate(cx,cy); ctx.rotate(u.ragA||0); ctx.translate(-cx,-cy); }
  ctx.lineJoin='round'; ctx.lineCap='round';
  // chassis (flip space, nose = +x)
  ctx.save(); ctx.translate(cx,cy); ctx.scale(f,1); ctx.strokeStyle=team; ctx.lineWidth=2;
  if(g==='tank'){
    ctx.fillStyle='#161b27'; rr(-hw,hh-15,vt.w,15,7); ctx.fill();
    ctx.fillStyle='#0c1018'; for(let i=-3;i<=3;i++){ ctx.beginPath(); ctx.arc(i*13,hh-7,4,0,7); ctx.fill(); }
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(-hw+8,hh-15); ctx.lineTo(-hw+18,-hh+8); ctx.lineTo(hw-6,-hh+8); ctx.lineTo(hw+4,hh-15); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=body; rr(-14,-hh-4,30,16,5); ctx.fill(); ctx.stroke();
  } else if(g==='apc'){
    ctx.fillStyle='#0c1018'; for(const wx of [-hw+16,0,hw-16]){ ctx.beginPath(); ctx.arc(wx,hh-6,8,0,7); ctx.fill(); }
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(-hw+4,hh-8); ctx.lineTo(-hw+12,-hh+6); ctx.lineTo(hw-18,-hh+6); ctx.lineTo(hw,0); ctx.lineTo(hw,hh-8); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=body; rr(-8,-hh-2,18,12,4); ctx.fill(); ctx.stroke();
  } else if(g==='artillery'){
    ctx.fillStyle='#161b27'; rr(-hw,hh-12,vt.w,12,5); ctx.fill();
    ctx.fillStyle='#0c1018'; for(let i=-3;i<=3;i++){ ctx.beginPath(); ctx.arc(i*15,hh-6,4,0,7); ctx.fill(); }
    ctx.fillStyle=body; rr(-hw*0.5,-6,vt.w*0.5,hh+6,5); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#2a3040'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(-hw+6,hh-4); ctx.lineTo(-hw-8,hh+4); ctx.stroke();
  } else if(g==='mech'){
    ctx.strokeStyle='#2a3040'; ctx.lineWidth=7; const ph=u.moving?Math.sin(u.walk)*0.5:0.1;
    for(const s2 of [1,-1]){ const a=ph*s2; ctx.beginPath(); ctx.moveTo(0,-hh*0.1); ctx.lineTo(s2*10+Math.sin(a)*6,hh*0.45); ctx.lineTo(s2*14+Math.sin(a)*16,hh); ctx.stroke(); }
    ctx.strokeStyle=team; ctx.lineWidth=2; ctx.fillStyle=body; rr(-hw,-hh,vt.w,hh*1.1,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#0c1018'; rr(-hw*0.5,-hh+8,vt.w*0.5,10,3); ctx.fill();
  } else if(g==='attacker'){
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(hw*0.3,-hh); ctx.lineTo(-hw,-hh*0.4); ctx.lineTo(-hw,hh*0.4); ctx.lineTo(hw*0.3,hh); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#26303f'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(-hw*0.1,2); ctx.lineTo(-hw*0.6,hh*1.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-hw+6,-2); ctx.lineTo(-hw-4,-hh*1.2); ctx.stroke();
    ctx.fillStyle='#9fe3ff'; rr(hw*0.15,-hh*0.55,14,8,3); ctx.fill();
  } else if(g==='bomber'){            // sleek heavy bomber (pointed fuselage, swept wing, tail, engine pods)
    ctx.fillStyle=body; ctx.beginPath();
    ctx.moveTo(hw,0); ctx.lineTo(hw*0.5,-hh*0.55); ctx.lineTo(-hw*0.9,-hh*0.4); ctx.lineTo(-hw,0); ctx.lineTo(-hw*0.9,hh*0.4); ctx.lineTo(hw*0.5,hh*0.55); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(hw*0.1,hh*0.3); ctx.lineTo(-hw*0.55,hh*1.7); ctx.lineTo(-hw*0.05,hh*1.45); ctx.lineTo(-hw*0.25,hh*0.3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-hw*0.7,-hh*0.3); ctx.lineTo(-hw*1.05,-hh*1.3); ctx.lineTo(-hw*0.55,-hh*0.3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#0c1018'; for(const ex of [-hw*0.1,hw*0.2]){ rr(ex-6,hh*0.45,13,7,3); ctx.fill(); }
    ctx.fillStyle='#9fe3ff'; ctx.beginPath(); ctx.ellipse(hw*0.55,-hh*0.18,6,3.5,0,0,7); ctx.fill();
  } else if(g==='stealth'){           // B-2 flying wing — flat dark chevron, no tail
    ctx.fillStyle=body; ctx.beginPath();
    ctx.moveTo(hw,0); ctx.lineTo(-hw*0.15,-hh*1.5); ctx.lineTo(-hw,-hh*0.35); ctx.lineTo(-hw*0.5,0); ctx.lineTo(-hw,hh*0.35); ctx.lineTo(-hw*0.15,hh*1.5); ctx.closePath();
    ctx.fill(); ctx.strokeStyle=team; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#0d121b'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(-hw*0.5,0);
    ctx.moveTo(hw*0.1,-hh*0.55); ctx.lineTo(-hw*0.35,-hh*0.55); ctx.moveTo(hw*0.1,hh*0.55); ctx.lineTo(-hw*0.35,hh*0.55); ctx.stroke();
  } else if(g==='jet'){               // sharp delta fighter with afterburner
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(-hw*0.5,-hh*0.55); ctx.lineTo(-hw,-hh*0.3); ctx.lineTo(-hw,hh*0.3); ctx.lineTo(-hw*0.5,hh*0.55); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(0,hh*0.3); ctx.lineTo(-hw*0.7,hh*1.5); ctx.lineTo(-hw*0.3,hh*0.3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-hw*0.7,-hh*0.2); ctx.lineTo(-hw,-hh*1.15); ctx.lineTo(-hw*0.45,-hh*0.2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#9fe3ff'; ctx.beginPath(); ctx.ellipse(hw*0.4,-hh*0.12,7,3,0,0,7); ctx.fill();
    ctx.fillStyle='#ff8a3a'; ctx.beginPath(); ctx.arc(-hw,0,hh*0.42,0,7); ctx.fill();
  } else if(g==='rockettruck'){       // flatbed with angled rocket rack
    ctx.fillStyle='#0c1018'; for(const wx of [-hw+16,0,hw-16]){ ctx.beginPath(); ctx.arc(wx,hh-6,8,0,7); ctx.fill(); }
    ctx.fillStyle=body; rr(-hw,-4,vt.w*0.9,hh+2,4); ctx.fill(); ctx.stroke();
    rr(hw-26,-hh-2,24,hh+8,4); ctx.fill(); ctx.stroke();
    ctx.lineCap='round';
    for(let i=-1;i<=1;i++){ const ox=-hw*0.15+i*8, tx=ox-hh*0.9, ty=-hh*1.3;
      ctx.strokeStyle='#2a3040'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(ox,-6); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.fillStyle=vt.pcolor; ctx.beginPath(); ctx.arc(tx,ty,3,0,7); ctx.fill(); }       // rocket noses
  } else if(g==='nebel'){           // static multi-barrel rocket launcher on a carriage
    ctx.fillStyle='#0c1018'; for(const wx of [-hw*0.45,hw*0.45]){ ctx.beginPath(); ctx.arc(wx,hh-5,7,0,7); ctx.fill(); }   // wheels
    ctx.strokeStyle='#2a3040'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(hw*0.2,hh-3); ctx.lineTo(hw*0.7,hh+7); ctx.stroke();   // trail leg
    ctx.fillStyle=body; rr(-hw*0.45,-hh*0.3,vt.w*0.5,hh*0.9,4); ctx.fill(); ctx.stroke();   // mount
    ctx.lineCap='round';
    for(let i=-2;i<=2;i++){ const oy=-hh*0.1+i*5, sx2=-hw*0.3, sy2=oy, tx=hw*0.55, ty=oy-hh*0.8;
      ctx.strokeStyle='#1d2430'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(sx2,sy2); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.fillStyle=vt.pcolor; ctx.beginPath(); ctx.arc(tx,ty,2.6,0,7); ctx.fill(); }       // 5 rocket tubes
    if(u.flash>0){ ctx.globalAlpha=u.flash/0.07; ctx.fillStyle=vt.pcolor; ctx.beginPath(); ctx.arc(hw*0.55,-hh*0.9,7,0,7); ctx.fill(); ctx.globalAlpha=1; }
  } else if(g==='heli'){
    ctx.fillStyle=body; rr(-hw*0.5,-hh*0.5,vt.w*0.7,hh,hh*0.5); ctx.fill(); ctx.stroke();
    ctx.strokeStyle=body; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(hw*0.15,0); ctx.lineTo(-hw,-hh*0.2); ctx.stroke();
    ctx.fillStyle='#9fe3ff'; rr(-2,-hh*0.4,12,8,3); ctx.fill();
    ctx.strokeStyle='#cfd6e0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-hw,-hh*0.2); ctx.lineTo(-hw-8,-hh*0.6); ctx.stroke();
    ctx.strokeStyle='#2a3040'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-hw*0.4,hh*0.6); ctx.lineTo(hw*0.4,hh*0.6); ctx.stroke();
  }
  ctx.restore();
  // turret barrel (world-aim) for ground turreted vehicles
  if(g==='tank'||g==='apc'||g==='mech'){
    const by= g==='mech'? cy-hh*0.5 : cy-hh-2;
    ctx.save(); ctx.translate(cx,by); ctx.rotate(u.aim); if(u.recoil>0) ctx.translate(-u.recoil*7,0); ctx.strokeStyle='#2a3040'; ctx.lineWidth=g==='tank'?7:5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(vt.w*(g==='tank'?0.55:0.45),0); ctx.stroke();
    if(u.flash>0){ ctx.globalAlpha=u.flash/0.07; ctx.fillStyle=vt.pcolor; ctx.beginPath(); ctx.arc(vt.w*0.55,0,7,0,7); ctx.fill(); ctx.globalAlpha=1; }
    ctx.restore();
  } else if(g==='artillery'){
    ctx.save(); ctx.translate(cx,cy-4); ctx.rotate(f>0?-0.9:Math.PI+0.9); if(u.recoil>0) ctx.translate(-u.recoil*8,0);
    ctx.strokeStyle='#2a3040'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(vt.w*0.7,0); ctx.stroke();
    if(u.flash>0){ ctx.globalAlpha=u.flash/0.07; ctx.fillStyle=vt.pcolor; ctx.beginPath(); ctx.arc(vt.w*0.7,0,8,0,7); ctx.fill(); ctx.globalAlpha=1; }
    ctx.restore();
  }
  // spinning main rotor for heli
  if(g==='heli' && u.alive){ ctx.save(); ctx.translate(cx,cy-hh-2); ctx.strokeStyle='#cfd6e0'; ctx.lineWidth=3;
    const rw=vt.w*0.6*Math.cos((u.bob*8)%6.283)+8; ctx.beginPath(); ctx.moveTo(-rw,0); ctx.lineTo(rw,0); ctx.stroke(); ctx.restore(); }
  // nose muzzle flash for planes
  if(u.alive && u.flash>0 && u.domain==='air' && vt.proj!=='bomb'){ ctx.globalAlpha=u.flash/0.07; ctx.fillStyle=vt.pcolor;
    ctx.beginPath(); ctx.arc(cx+f*hw,cy,6,0,7); ctx.fill(); ctx.globalAlpha=1; }
  // smoke when destroyed
  if(!u.alive){ ctx.globalAlpha=Math.max(0,1-u.deadT/4)*0.55; ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(cx,cy-hh-8,9+u.deadT*8,0,7); ctx.fill(); ctx.globalAlpha=1; }
  // hp bar
  if(u.alive && u.hp<u.maxHp){ const bw=vt.w*0.9, bx=cx-bw/2, by=cy-hh-(g==='heli'?22:13);
    ctx.fillStyle='#0009'; ctx.fillRect(bx-1,by-1,bw+2,6);
    ctx.fillStyle=u.hp/u.maxHp>0.5?'#3fb950':(u.hp/u.maxHp>0.25?'#d29922':'#f85149'); ctx.fillRect(bx,by,bw*Math.max(0,u.hp/u.maxHp),4); }
  ctx.restore();
}

// flag painted inside a ball of radius r, centered at local (0,0) (already clipped to the circle)
function drawFlag(c, r){ const W2=r*2, X=-r, Y=-r;
  const fill=(x,y,w,h,col)=>{ ctx.fillStyle=col; ctx.fillRect(x,y,w,h); };
  const star=(x,y,rad,col,rot=-Math.PI/2)=>{ ctx.fillStyle=col; ctx.beginPath();
    for(let i=0;i<5;i++){ const a=rot+i*2*Math.PI/5; ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);
      const a2=a+Math.PI/5; ctx.lineTo(x+Math.cos(a2)*rad*0.4,y+Math.sin(a2)*rad*0.4); } ctx.closePath(); ctx.fill(); };
  switch(c){
    case 'usa': { const sh=W2/13; for(let i=0;i<13;i++) fill(X,Y+i*sh,W2,sh,i%2?'#fff':'#b22234');
      fill(X,Y,W2*0.5,sh*7,'#3c3b6e'); ctx.fillStyle='#fff';
      for(let a=0;a<5;a++)for(let b=0;b<5;b++){ ctx.beginPath(); ctx.arc(X+W2*0.07+a*W2*0.1,Y+sh*0.9+b*sh*1.25,r*0.045,0,7); ctx.fill(); } break; }
    case 'canada': fill(X,Y,W2,W2,'#fff'); fill(X,Y,W2*0.26,W2,'#d52b1e'); fill(X+W2*0.74,Y,W2*0.26,W2,'#d52b1e'); star(0,r*0.05,r*0.5,'#d52b1e',-Math.PI/2); break;
    case 'mexico': fill(X,Y,W2/3,W2,'#006847'); fill(X+W2/3,Y,W2/3,W2,'#fff'); fill(X+2*W2/3,Y,W2/3,W2,'#ce1126'); ctx.fillStyle='#7a5230'; ctx.beginPath(); ctx.arc(0,0,r*0.16,0,7); ctx.fill(); break;
    case 'germany': fill(X,Y,W2,W2,'#1c1c1c'); ctx.fillStyle='#ededed'; { const t=r*0.34; ctx.fillRect(-t/2,Y,t,W2); ctx.fillRect(X,-t/2,W2,t);
      ctx.fillStyle='#1c1c1c'; const t2=t*0.5; ctx.fillRect(-t2/2,Y,t2,W2); ctx.fillRect(X,-t2/2,W2,t2); } break;
    case 'uk': fill(X,Y,W2,W2,'#012169');
      ctx.lineCap='butt'; ctx.strokeStyle='#fff'; ctx.lineWidth=r*0.34; ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(-X,-Y); ctx.moveTo(-X,Y); ctx.lineTo(X,-Y); ctx.stroke();
      ctx.strokeStyle='#c8102e'; ctx.lineWidth=r*0.13; ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(-X,-Y); ctx.moveTo(-X,Y); ctx.lineTo(X,-Y); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.fillRect(-r*0.28,Y,r*0.56,W2); ctx.fillRect(X,-r*0.28,W2,r*0.56);
      ctx.fillStyle='#c8102e'; ctx.fillRect(-r*0.16,Y,r*0.32,W2); ctx.fillRect(X,-r*0.16,W2,r*0.32); break;
    case 'skorea': fill(X,Y,W2,W2,'#fff');
      ctx.fillStyle='#cd2e3a'; ctx.beginPath(); ctx.arc(0,0,r*0.42,Math.PI,0); ctx.fill();
      ctx.fillStyle='#0047a0'; ctx.beginPath(); ctx.arc(0,0,r*0.42,0,Math.PI); ctx.fill();
      ctx.fillStyle='#cd2e3a'; ctx.beginPath(); ctx.arc(-r*0.21,0,r*0.21,0,7); ctx.fill();
      ctx.fillStyle='#0047a0'; ctx.beginPath(); ctx.arc(r*0.21,0,r*0.21,0,7); ctx.fill(); break;
    case 'france': fill(X,Y,W2/3,W2,'#0055a4'); fill(X+W2/3,Y,W2/3,W2,'#fff'); fill(X+2*W2/3,Y,W2/3,W2,'#ef4135'); break;
    case 'ussr': fill(X,Y,W2,W2,'#c8102e'); star(X+r*0.55,Y+r*0.55,r*0.26,'#ffd700');
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=r*0.09; ctx.beginPath(); ctx.arc(X+r*0.55,Y+r*0.95,r*0.22,Math.PI*1.05,Math.PI*1.95); ctx.stroke(); break;
    case 'russia': fill(X,Y,W2,W2/3,'#fff'); fill(X,Y+W2/3,W2,W2/3,'#0039a6'); fill(X,Y+2*W2/3,W2,W2/3,'#d52b1e'); break;
    case 'china': fill(X,Y,W2,W2,'#de2910'); star(X+r*0.55,Y+r*0.5,r*0.3,'#ffde00');
      for(const[dx,dy]of[[1.05,0.2],[1.25,0.45],[1.25,0.8],[1.05,1.05]]) star(X+r*dx,Y+r*dy,r*0.1,'#ffde00'); break;
    case 'vietnam': fill(X,Y,W2,W2,'#da251d'); star(0,0,r*0.46,'#ffff00'); break;
    case 'japan': fill(X,Y,W2,W2,'#fff'); ctx.fillStyle='#bc002d';
      for(let i=0;i<16;i+=2){ const a=i*Math.PI/8, a2=(i+1)*Math.PI/8; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r*1.6,Math.sin(a)*r*1.6); ctx.lineTo(Math.cos(a2)*r*1.6,Math.sin(a2)*r*1.6); ctx.closePath(); ctx.fill(); }
      ctx.beginPath(); ctx.arc(0,0,r*0.3,0,7); ctx.fill(); break;
    case 'nkorea': fill(X,Y,W2,W2,'#024fa2'); fill(X,Y+W2*0.26,W2,W2*0.48,'#fff'); fill(X,Y+W2*0.33,W2,W2*0.34,'#ed1c27');
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(X+r*0.62,0,r*0.26,0,7); ctx.fill(); star(X+r*0.62,0,r*0.18,'#ed1c27'); break;
    case 'cuba': for(let i=0;i<5;i++) fill(X,Y+i*W2/5,W2,W2/5,i%2?'#fff':'#002a8f');
      ctx.fillStyle='#cf142b'; ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(X+r*0.95,0); ctx.lineTo(X,-Y); ctx.closePath(); ctx.fill(); star(X+r*0.32,0,r*0.2,'#fff'); break;
    default: fill(X,Y,W2,W2,'#888');
  }
}

// ── Countryball ("wobbly ball") form ──
function drawBall(u){
  const s=u.size, sk=skinById(u.skin), w=wepById(u.weapon), f=u.face;
  const r=s*1.7, cx=u.x, cy=u.y-r;                  // ball rests on the ground
  ctx.save();
  if(!u.alive){ ctx.translate(u.x,u.y); ctx.rotate(u.ragA*0.6); ctx.translate(-u.x,-u.y); ctx.globalAlpha=Math.max(0,Math.min(1,(10-u.deadT)/3)); }
  const wob=(u.lean||0)+(u.moving?Math.sin(u.walk)*0.06:0)+(u.hipKick||0)*0.012;   // wobble
  ctx.translate(cx,cy); ctx.rotate(wob); ctx.translate(-cx,-cy);
  // weapon arm + weapon
  let aArm; if(w.cat==='ranged'){ aArm=u.aim!==undefined?u.aim:(f>0?0:Math.PI); }
  else { const sw=u.swing>0?u.swing:0; aArm=f>0?(-0.5+(1-sw)*1.7):(Math.PI+0.5-(1-sw)*1.7); }
  const hx=cx+Math.cos(aArm)*r*0.85, hy=cy+Math.sin(aArm)*r*0.85;
  ctx.strokeStyle=u.hit>0?'#fff':sk.color; ctx.lineWidth=Math.max(2.5,s*0.3); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(hx,hy); ctx.stroke();
  ctx.save(); ctx.translate(hx,hy); ctx.rotate(aArm); if(f<0)ctx.scale(1,-1);
  if(u.recoil>0){ ctx.translate(-u.recoil*s*0.5,0); ctx.rotate(-u.recoil*0.18); } drawWeaponGfx(w,s,u); ctx.restore();
  // ball body (squash wobble)
  const sq=1+(u.moving?Math.sin(u.walk*2)*0.06:0);
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1/Math.max(0.7,sq),sq);
  ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.clip(); drawFlag(u.country||'default', r);
  if(u.hit>0){ ctx.globalAlpha=0.7; ctx.fillStyle='#fff'; ctx.fillRect(-r,-r,r*2,r*2); ctx.globalAlpha=1; } ctx.restore();
  ctx.lineWidth=Math.max(3,s*0.3); ctx.strokeStyle=u.team==='red'?'#ff5050':'#4da6ff'; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.stroke();
  // countryball eyes (pupils glance toward facing)
  const ex=r*0.34, ey=-r*0.18;
  for(const sgn of [-1,1]){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(sgn*ex,ey,r*0.2,r*0.27,0,0,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(sgn*ex+f*r*0.07,ey+r*0.04,r*0.1,0,7); ctx.fill(); }
  ctx.restore();
  // armour helmet cap + freeze tint
  const av=armorById(u.armor);
  if(av.color){ ctx.strokeStyle=av.color; ctx.lineWidth=Math.max(4,s*0.4); ctx.beginPath(); ctx.arc(cx,cy,r-2,Math.PI*1.15,Math.PI*1.85); ctx.stroke(); }
  if(u.slow>0){ ctx.strokeStyle='#9fe3ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,r+3,0,7); ctx.stroke(); }
  ctx.restore();
  if(u.alive && u.hp<u.maxHp){ const bw=r*2, bx=cx-bw/2, by=cy-r-9;
    ctx.fillStyle='#0009'; ctx.fillRect(bx-1,by-1,bw+2,5);
    ctx.fillStyle=u.hp/u.maxHp>0.5?'#3fb950':(u.hp/u.maxHp>0.25?'#d29922':'#f85149'); ctx.fillRect(bx,by,bw*Math.max(0,u.hp/u.maxHp),3); }
}

function render(){
  // sky (per-map tint)
  const sky=(MAPS[mapIndex]&&MAPS[mapIndex].sky)||['#10141d','#0a0d14'];
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,sky[0]); g.addColorStop(1,sky[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // setup side tint
  if(mode==='setup'){ ctx.fillStyle='rgba(255,80,80,.05)'; ctx.fillRect(0,0,W/2,H);
    ctx.fillStyle='rgba(77,166,255,.05)'; ctx.fillRect(W/2,0,W/2,H); }
  // platforms
  for(const p of plats){ ctx.fillStyle=WALL_C; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle=WALL_E; ctx.fillRect(p.x,p.y,p.w,4); }
  // map decorations
  if(MAPS[mapIndex] && MAPS[mapIndex].decor) MAPS[mapIndex].decor();
  // strike target markers (reticle + countdown)
  for(const m of strikes){ if(m.fired)continue; const col=m.team==='red'?'#ff5050':'#4da6ff', my=GY-8, k=m.t/m.max;
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(m.x,my,16,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(m.x-22,my); ctx.lineTo(m.x+22,my); ctx.moveTo(m.x,my-22); ctx.lineTo(m.x,my-(GY-my)-30); ctx.stroke();
    ctx.strokeStyle='#ffd166'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(m.x,my,16,-Math.PI/2,-Math.PI/2+(1-k)*2*Math.PI); ctx.stroke();
    ctx.font='13px Segoe UI'; ctx.fillStyle=col; ctx.textAlign='center'; ctx.fillText(strikeById(m.sid).em, m.x, my-22); ctx.textAlign='left'; }
  // ground hazards (fire pools / gas clouds)
  for(const h of hazards){
    if(h.det){ ctx.fillStyle='#caa84a'; ctx.fillRect(h.x-7,h.y-10,14,10); ctx.strokeStyle='#7a6020'; ctx.lineWidth=1.5; ctx.strokeRect(h.x-7,h.y-10,14,10);
      const blink=Math.sin(performance.now()/(h.t<0.5?45:140))>0; ctx.fillStyle=blink?'#ff3030':'#5a0000'; ctx.beginPath(); ctx.arc(h.x,h.y-13,2.5,0,7); ctx.fill(); continue; }
    const k=Math.min(1,h.t/0.6)*(h.fire?1:0.8), tt=performance.now()/90;
    for(let i=0;i<8;i++){ const hx=h.x-h.r+(i/7)*h.r*2, fl=(h.fire?11:9)*(0.55+0.45*Math.sin(tt+i*1.3));
      ctx.globalAlpha=k*(h.fire?0.7:0.4); ctx.fillStyle=h.fire?(i%2?'#ff9e3a':'#ff5a1e'):'#9bd36a';
      ctx.beginPath(); ctx.arc(hx, h.y-5-(h.fire?fl*0.4:0), fl,0,7); ctx.fill(); } ctx.globalAlpha=1; }
  // dead under
  const drawUnit = bodyStyle==='ball'?drawBall:drawHumanoid;
  for(const u of units) if(!u.alive) (u.kind==='vehicle'?drawVehicle:drawUnit)(u);
  // fx (booms) under living
  for(const f of fx) if(f.type==='boom'){ const k=f.t/f.max; ctx.globalAlpha=k*0.7; ctx.fillStyle='#ff7b3a';
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1-k*0.4),0,7); ctx.fill(); ctx.globalAlpha=k; ctx.strokeStyle='#ffd166';
    ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1-k*0.2),0,7); ctx.stroke(); ctx.globalAlpha=1; }
  // living
  for(const u of units) if(u.alive) (u.kind==='vehicle'?drawVehicle:drawUnit)(u);
  // projectiles
  for(const p of projs){ ctx.strokeStyle=p.color; ctx.fillStyle=p.color;
    if(p.strike){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(Math.atan2(p.vy,p.vx)+Math.PI/2);
      const big=p.nuke?1.8:1; ctx.fillStyle=p.color; ctx.fillRect(-3*big,-9*big,6*big,18*big);
      ctx.beginPath(); ctx.moveTo(-3*big,-9*big); ctx.lineTo(0,-15*big); ctx.lineTo(3*big,-9*big); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#3a3a3a'; ctx.beginPath(); ctx.moveTo(-3*big,9*big); ctx.lineTo(-6*big,13*big); ctx.lineTo(-3*big,13*big); ctx.moveTo(3*big,9*big); ctx.lineTo(6*big,13*big); ctx.lineTo(3*big,13*big); ctx.fill(); ctx.restore(); }
    else if(p.aoe){ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); }
    else { ctx.lineWidth=p.pierce?3:2; const m=Math.hypot(p.vx,p.vy)||1, l=p.pierce?16:9;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx/m*l,p.y-p.vy/m*l); ctx.stroke(); } }
  // slashes + sparks over
  for(const f of fx){ const k=f.t/f.max;
    if(f.type==='slash'){ ctx.globalAlpha=k; ctx.strokeStyle=f.color; ctx.lineWidth=4;
      const a0=f.face>0?-0.9:Math.PI+0.9, a1=f.face>0?0.5:Math.PI-0.5;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.len*0.6,Math.min(a0,a1),Math.max(a0,a1)); ctx.stroke(); ctx.globalAlpha=1; }
    else if(f.type==='spark'){ ctx.globalAlpha=k; ctx.fillStyle=f.color; const r=(f.big?10:5)*(1+(1-k));
      ctx.beginPath(); ctx.arc(f.x,f.y,r,0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='smoke'){ ctx.globalAlpha=k*0.4; ctx.fillStyle='#8a8f98'; ctx.beginPath(); ctx.arc(f.x,f.y,f.r*(1.6-k),0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='ember'){ ctx.globalAlpha=k; ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(f.x,f.y,2.2*k+0.5,0,7); ctx.fill(); ctx.globalAlpha=1; }
    else if(f.type==='blast'){ ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.ang);
      ctx.globalAlpha=k*0.6; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,(1-k)*20+4,0,7); ctx.stroke();   // shockwave ring
      ctx.globalAlpha=k; const len=14+(1-k)*12; const grd=ctx.createLinearGradient(0,0,len,0);
      grd.addColorStop(0,'#fff'); grd.addColorStop(0.4,f.color); grd.addColorStop(1,'rgba(255,140,0,0)'); ctx.fillStyle=grd;
      ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(len,0); ctx.lineTo(0,5); ctx.closePath(); ctx.fill();                          // hot cone
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,3.5*k+1.5,0,7); ctx.fill(); ctx.globalAlpha=1; ctx.restore(); } }
  // counts
  document.getElementById('cRed').textContent  = units.filter(u=>u.alive&&u.team==='red').length;
  document.getElementById('cBlue').textContent = units.filter(u=>u.alive&&u.team==='blue').length;
  if(toastT>0){ ctx.globalAlpha=Math.min(1,toastT); ctx.fillStyle='#ffd166'; ctx.font='bold 20px Segoe UI';
    ctx.textAlign='center'; ctx.fillText(toastMsg,W/2,60); ctx.globalAlpha=1; ctx.textAlign='left'; }
  if(screenFlash>0){ ctx.globalAlpha=Math.min(0.85,screenFlash); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }   // nuke flash
}

/* ===================== LOOP ===================== */
let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(toastT>0)toastT-=dt;
  if(mode==='battle'&&!paused){ let acc=dt*speed; while(acc>0){ const st=Math.min(acc,0.0166); updateBattle(st); acc-=st; } }
  render(); requestAnimationFrame(loop);
}
setMode('setup'); randomArmy(); requestAnimationFrame(loop);
</script>
</body>
